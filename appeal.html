<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>現場人員回報 - 總經理直通車</title>
  <meta name="description" content="直通總經理的申訴管道">
  <meta property="og:type" content="website">
  <meta property="og:title" content="直通總經理的申訴管道">
  <meta property="og:description" content="直通總經理的申訴管道">
  <meta property="og:url" content="https://nw-com.github.io/nw-checkin-all-2026/appeal.html">
  <meta property="og:image" content="https://nw-com.github.io/nw-checkin-all-2026/photo/qr001.jpg">
  <meta property="og:image:width" content="220">
  <meta property="og:image:height" content="220">
  <meta name="twitter:card" content="summary_large_image">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="./firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <style>
    /* 隱藏捲軸但保留捲動功能，讓畫面更像 App */
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; background-color: #f8fafc; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="text-slate-800 antialiased pb-24">

  <!-- 頂部導覽列 (固定) -->
  <header class="fixed top-0 left-0 right-0 bg-red-700 text-white shadow-md z-40">
    <div class="flex items-center justify-center h-14 px-4 max-w-md mx-auto">
      <i data-lucide="shield-alert" class="w-6 h-6 mr-2 text-red-200"></i>
      <h1 class="text-lg font-bold tracking-widest">總經理直通車</h1>
    </div>
  </header>

  <!-- 主要內容區塊 -->
  <main class="pt-16 px-4 max-w-md mx-auto">
    
    <div class="bg-red-50 text-red-800 p-4 rounded-xl mb-6 shadow-sm border border-red-100 flex items-start">
      <i data-lucide="message-square" class="w-5 h-5 mr-3 mt-0.5 flex-shrink-0"></i>
      <p class="text-sm font-medium leading-relaxed">您的意見將直接加密傳送至總經理信箱，請放心據實填寫。</p>
    </div>

    <form id="reportForm" class="space-y-5">
      
      <!-- 派駐社區 -->
      <div class="space-y-1.5">
        <label class="text-sm font-bold text-slate-700 flex items-center">
          <i data-lucide="map-pin" class="w-4 h-4 mr-1.5 text-slate-400"></i> 派駐社區
        </label>
        <input type="text" id="community" required placeholder="例如：帝寶社區" 
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-base shadow-sm">
      </div>

      <!-- 姓名 -->
      <div class="space-y-1.5">
        <label class="text-sm font-bold text-slate-700 flex items-center">
          <i data-lucide="user" class="w-4 h-4 mr-1.5 text-slate-400"></i> 您的姓名
        </label>
        <input type="text" id="name" required placeholder="請輸入姓名" 
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-base shadow-sm">
      </div>

      <!-- 聯絡電話 -->
      <div class="space-y-1.5">
        <label class="text-sm font-bold text-slate-700 flex items-center">
          <i data-lucide="phone" class="w-4 h-4 mr-1.5 text-slate-400"></i> 聯絡電話
        </label>
        <input type="tel" id="contactPhone" required placeholder="請輸入聯絡電話"
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-base shadow-sm">
      </div>

      <!-- 職務別 -->
      <div class="space-y-1.5">
        <label class="text-sm font-bold text-slate-700">職務別</label>
        <select id="role" required
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-base shadow-sm appearance-none">
          <option value="" disabled selected>請選擇您的職務</option>
          <option value="總幹事">總幹事</option>
          <option value="秘書">秘書</option>
          <option value="保全人員">保全人員</option>
          <option value="清潔人員">清潔人員</option>
          <option value="機電人員">機電人員</option>
        </select>
      </div>

      <!-- 狀況分類 -->
      <div class="space-y-1.5">
        <label class="text-sm font-bold text-slate-700">狀況分類</label>
        <select id="category" required disabled
          class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-base shadow-sm appearance-none bg-slate-100 text-slate-400">
          <option value="" disabled selected>請先選擇職務</option>
        </select>
      </div>

      <!-- 緊急程度 (單選按鈕群組) -->
      <div class="space-y-1.5">
        <label class="text-sm font-bold text-slate-700">緊急程度</label>
        <div class="flex space-x-3" id="urgencyGroup">
          <button type="button" data-level="高" class="urgency-btn flex-1 py-3 rounded-xl font-bold border-2 transition-all bg-slate-50 text-slate-500 border-slate-200">高</button>
          <button type="button" data-level="中" class="urgency-btn flex-1 py-3 rounded-xl font-bold border-2 transition-all bg-yellow-100 text-yellow-800 border-yellow-400">中</button>
          <button type="button" data-level="低" class="urgency-btn flex-1 py-3 rounded-xl font-bold border-2 transition-all bg-slate-50 text-slate-500 border-slate-200">低</button>
        </div>
        <input type="hidden" id="urgency" value="中">
      </div>

      <!-- 詳細說明 -->
      <div class="space-y-1.5">
        <label class="text-sm font-bold text-slate-700">詳細說明 (人、事、時、地、物)</label>
        <textarea id="description" required rows="4" placeholder="請詳細描述發生的經過，需要何種支援..."
          class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none transition-all text-base shadow-sm"></textarea>
      </div>

      <!-- 上傳照片 -->
      <div class="space-y-1.5">
        <label for="photo" class="text-sm font-bold text-slate-700 flex items-center">
          <i data-lucide="image-plus" class="w-4 h-4 mr-1.5 text-slate-400"></i> 上傳照片
        </label>
        <div class="grid grid-cols-2 gap-3">
          <label for="photo" class="block w-full px-4 py-4 bg-white border border-dashed border-slate-300 rounded-xl text-center text-slate-500 shadow-sm cursor-pointer hover:border-blue-400 hover:text-blue-600 transition-all">
            <span class="font-bold">選擇照片</span>
            <span class="block text-xs mt-1">從相簿上傳</span>
          </label>
          <label for="photoCamera" class="block w-full px-4 py-4 bg-white border border-dashed border-slate-300 rounded-xl text-center text-slate-500 shadow-sm cursor-pointer hover:border-blue-400 hover:text-blue-600 transition-all">
            <span class="font-bold">拍照上傳</span>
            <span class="block text-xs mt-1">開啟相機拍照</span>
          </label>
        </div>
        <input type="file" id="photo" accept="image/*" class="hidden">
        <input type="file" id="photoCamera" accept="image/*" capture="environment" class="hidden">
        <div id="photoStatus" class="text-xs text-slate-400">尚未選擇照片</div>
        <div id="photoPreviewWrap" class="hidden">
          <img id="photoPreview" src="" alt="照片預覽" class="w-full rounded-2xl border border-slate-200 bg-white object-contain max-h-64 shadow-sm">
        </div>
      </div>

    </form>
  </main>

  <!-- 底部固定送出按鈕 -->
  <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-slate-200 z-40">
    <button type="submit" form="reportForm" 
      class="w-full max-w-md mx-auto bg-red-600 active:bg-red-700 text-white font-bold py-4 rounded-xl flex items-center justify-center transition-colors shadow-lg text-lg">
      直接呈報總經理 <i data-lucide="arrow-right" class="ml-2 w-5 h-5"></i>
    </button>
  </div>

  <!-- 成功提示 Overlay -->
  <div id="successOverlay" class="fixed inset-0 bg-white/95 backdrop-blur-sm z-50 hidden flex-col items-center justify-center">
    <i data-lucide="check-circle" class="w-24 h-24 text-green-500 mb-6 drop-shadow-md"></i>
    <h3 class="text-3xl font-bold text-slate-800 mb-2">呈報成功！</h3>
    <p class="text-slate-500 font-medium text-lg">資料已加密送出，感謝您的回報。</p>
  </div>

  <script>
    // 初始化 Lucide Icons
    lucide.createIcons();

    const APPEAL_STORAGE_KEY = 'gm_appeal_reports';
    const DEFAULT_APP_ID = 'default-attendance-app';
    const APP_ID = typeof window.__app_id === 'string' && window.__app_id.trim() ? window.__app_id.trim() : DEFAULT_APP_ID;

    function getFirestoreDb() {
      if (!window.firebase) throw new Error('Firebase SDK 未載入');
      if (!window.FIREBASE_CONFIG) throw new Error('缺少 firebase-config.js 或 FIREBASE_CONFIG');
      if (!firebase.apps || firebase.apps.length === 0) firebase.initializeApp(window.FIREBASE_CONFIG);
      return firebase.firestore();
    }

    function getAppealsCollection(db) {
      return db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('appeals');
    }

    // 定義資料
    const ROLE_ISSUES = {
      '總幹事': ['管委會糾紛/異常要求', '社區合約危機(面臨解約)', '帳務/資金異常', '重大公共意外(火災/淹水)'],
      '秘書': ['住戶嚴重客訴', '行政流程/帳務異常', '管委會交辦事項異常'],
      '保全人員': ['住戶/訪客暴力衝突', '夜間突發緊急狀況', '哨點設備嚴重損壞', '排班/人力嚴重短缺'],
      '清潔人員': ['重大衛生異常/大量廢棄物', '清潔設備/耗材嚴重缺乏', '工作環境安全/職災疑慮'],
      '機電人員': ['電梯/發電機重大故障', '社區大停電/大漏水', '消防設備異常/安檢未過'],
    };
    const GENERAL_ISSUES = ['薪資/出勤異常', '職場霸凌/不平等待遇', '對公司營運重大建議', '其他'];

    const roleSelect = document.getElementById('role');
    const categorySelect = document.getElementById('category');
    const urgencyBtns = document.querySelectorAll('.urgency-btn');
    const urgencyInput = document.getElementById('urgency');
    const form = document.getElementById('reportForm');
    const successOverlay = document.getElementById('successOverlay');
    const photoInput = document.getElementById('photo');
    const photoCameraInput = document.getElementById('photoCamera');
    const photoStatus = document.getElementById('photoStatus');
    const photoPreviewWrap = document.getElementById('photoPreviewWrap');
    const photoPreview = document.getElementById('photoPreview');
    let selectedPhotoFile = null;

    function loadStoredReports() {
      try {
        const raw = localStorage.getItem(APPEAL_STORAGE_KEY);
        const parsed = JSON.parse(raw || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch (_) {
        return [];
      }
    }

    function saveStoredReports(reports) {
      localStorage.setItem(APPEAL_STORAGE_KEY, JSON.stringify(reports));
    }

    function formatReportDate(date) {
      const d = date instanceof Date ? date : new Date(date);
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hour = String(d.getHours()).padStart(2, '0');
      const minute = String(d.getMinutes()).padStart(2, '0');
      return `${month}/${day} ${hour}:${minute}`;
    }

    function resetPhotoStatus() {
      photoStatus.textContent = '尚未選擇照片';
      photoStatus.className = 'text-xs text-slate-400';
      selectedPhotoFile = null;
      if (photoInput) photoInput.value = '';
      if (photoCameraInput) photoCameraInput.value = '';
      if (photoPreview) photoPreview.src = '';
      if (photoPreviewWrap) photoPreviewWrap.classList.add('hidden');
    }

    function updatePhotoStatus(file, previewUrl) {
      if (!file) {
        resetPhotoStatus();
        return;
      }
      selectedPhotoFile = file;
      photoStatus.textContent = `已選擇：${file.name}`;
      photoStatus.className = 'text-xs text-emerald-600 font-medium';
      if (photoPreview && previewUrl) {
        photoPreview.src = previewUrl;
        photoPreviewWrap.classList.remove('hidden');
      }
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error('照片讀取失敗'));
        reader.readAsDataURL(file);
      });
    }

    async function buildPhotoPayload() {
      const file = selectedPhotoFile;
      if (!file) return null;
      const dataUrl = await compressImageToDataUrl(file);
      return {
        name: file.name,
        type: 'image/jpeg',
        dataUrl
      };
    }

    function loadImageFromDataUrl(dataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('照片載入失敗'));
        img.src = dataUrl;
      });
    }

    function getApproxBytesFromDataUrl(dataUrl) {
      const base64 = String(dataUrl || '').split(',')[1] || '';
      return Math.floor((base64.length * 3) / 4);
    }

    async function compressImageToDataUrl(file) {
      const originalDataUrl = await readFileAsDataUrl(file);
      const img = await loadImageFromDataUrl(originalDataUrl);

      const maxSize = 1280;
      const ratio = Math.min(1, maxSize / img.width, maxSize / img.height);
      const targetWidth = Math.max(1, Math.round(img.width * ratio));
      const targetHeight = Math.max(1, Math.round(img.height * ratio));

      const canvas = document.createElement('canvas');
      canvas.width = targetWidth;
      canvas.height = targetHeight;
      const ctx = canvas.getContext('2d');
      if (!ctx) throw new Error('無法處理照片');
      ctx.drawImage(img, 0, 0, targetWidth, targetHeight);

      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      const bytes = getApproxBytesFromDataUrl(dataUrl);
      if (bytes > 700 * 1024) {
        throw new Error('照片過大，請換一張較小的照片（建議用相簿選取後不要原始大小）。');
      }
      return dataUrl;
    }

    async function buildReportPayload() {
      const now = new Date();
      const photo = await buildPhotoPayload();
      return {
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        clientCreatedAt: now.toISOString(),
        date: formatReportDate(now),
        community: document.getElementById('community').value.trim(),
        name: document.getElementById('name').value.trim(),
        contactPhone: document.getElementById('contactPhone').value.trim(),
        role: roleSelect.value,
        category: categorySelect.value,
        urgency: urgencyInput.value,
        description: document.getElementById('description').value.trim(),
        photo,
        status: '未處理',
        handlingMethod: ''
      };
    }

    // 處理職務選擇連動分類
    roleSelect.addEventListener('change', (e) => {
      const role = e.target.value;
      categorySelect.innerHTML = '<option value="" disabled selected>請選擇發生的狀況</option>';
      
      if (role) {
        categorySelect.disabled = false;
        categorySelect.classList.remove('bg-slate-100', 'text-slate-400');
        categorySelect.classList.add('bg-white', 'text-slate-800');

        // 加入特定職務選項
        const optgroupRole = document.createElement('optgroup');
        optgroupRole.label = `--- 常見狀況 (${role}) ---`;
        ROLE_ISSUES[role].forEach(issue => {
          optgroupRole.innerHTML += `<option value="${issue}">${issue}</option>`;
        });
        categorySelect.appendChild(optgroupRole);

        // 加入通用選項
        const optgroupGen = document.createElement('optgroup');
        optgroupGen.label = '--- 公司通用狀況 ---';
        GENERAL_ISSUES.forEach(issue => {
          optgroupGen.innerHTML += `<option value="${issue}">${issue}</option>`;
        });
        categorySelect.appendChild(optgroupGen);
      }
    });

    // 處理緊急程度按鈕樣式切換
    const updateUrgencyStyles = (selectedLevel) => {
      urgencyBtns.forEach(btn => {
        const level = btn.getAttribute('data-level');
        btn.className = 'urgency-btn flex-1 py-3 rounded-xl font-bold border-2 transition-all';
        
        if (level === selectedLevel) {
          if (level === '高') btn.classList.add('bg-red-100', 'text-red-800', 'border-red-400');
          if (level === '中') btn.classList.add('bg-yellow-100', 'text-yellow-800', 'border-yellow-400');
          if (level === '低') btn.classList.add('bg-green-100', 'text-green-800', 'border-green-400');
        } else {
          btn.classList.add('bg-slate-50', 'text-slate-500', 'border-slate-200');
        }
      });
    };

    urgencyBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const level = e.target.getAttribute('data-level');
        urgencyInput.value = level;
        updateUrgencyStyles(level);
      });
    });

    function handlePhotoSelection(inputEl) {
      const file = inputEl && inputEl.files && inputEl.files[0];
      if (!file) {
        updatePhotoStatus(null);
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        updatePhotoStatus(file, String(reader.result || ''));
      };
      reader.onerror = () => {
        alert('照片預覽失敗，請重新選擇');
        resetPhotoStatus();
      };
      reader.readAsDataURL(file);
    }

    photoInput.addEventListener('change', () => {
      handlePhotoSelection(photoInput);
    });

    photoCameraInput.addEventListener('change', () => {
      handlePhotoSelection(photoCameraInput);
    });

    // 處理表單送出
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      try {
        const payload = await buildReportPayload();
        const reports = loadStoredReports();
        reports.unshift({ ...payload, createdAt: payload.clientCreatedAt });
        saveStoredReports(reports);

        const db = getFirestoreDb();
        await getAppealsCollection(db).add(payload);
      } catch (err) {
        alert(String(err && err.message ? err.message : err || '送出失敗'));
        return;
      }
      
      // 顯示成功畫面
      successOverlay.classList.remove('hidden');
      successOverlay.classList.add('flex', 'animate-fade-in');
      
      // 模擬傳送延遲後重置表單
      setTimeout(() => {
        successOverlay.classList.add('hidden');
        successOverlay.classList.remove('flex', 'animate-fade-in');
        form.reset();
        
        // 恢復預設狀態
        categorySelect.innerHTML = '<option value="" disabled selected>請先選擇職務</option>';
        categorySelect.disabled = true;
        categorySelect.classList.add('bg-slate-100', 'text-slate-400');
        categorySelect.classList.remove('bg-white', 'text-slate-800');
        urgencyInput.value = '中';
        updateUrgencyStyles('中');
        resetPhotoStatus();
        window.scrollTo(0, 0);
      }, 2500);
    });

  </script>
</body>
</html>
