<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人頁面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="./firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body class="max-w-md mx-auto bg-gray-50 h-screen flex flex-col">

    <!-- 頂部導覽 -->
    <header id="page-header" class="bg-green-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i data-lucide="user"></i> <span id="page-title">個人頁面</span>
            </h1>
            <div id="connection-status" class="text-xs bg-green-500 px-2 py-1 rounded-full flex items-center gap-1">
                <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span> 線上
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main id="app-main" class="flex-1 p-4 overflow-y-auto" style="padding-bottom: 100px;">
        
        <!-- 視圖：我的資訊 -->
        <div id="view-add" class="view-content">
            <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-4">
                <div class="p-4 border-b border-gray-100">
                    <h2 class="font-bold text-gray-700">我的資訊</h2>
                </div>
                <div class="p-4 space-y-4">
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-24 h-24 rounded-full overflow-hidden bg-gray-100 border border-gray-200 flex items-center justify-center">
                            <img id="my-avatar-img" class="w-full h-full object-cover hidden" alt="avatar" />
                            <div id="my-avatar-fallback" class="text-gray-400">
                                <i data-lucide="user" size="36"></i>
                            </div>
                        </div>
                        <div id="my-name" class="text-lg font-black text-gray-800"></div>
                    </div>
                    <div class="bg-white border border-gray-100 rounded-xl p-4">
                        <div class="flex items-center justify-between mb-2">
                            <button type="button" onclick="changeMyQaiDate(-1)" id="my-qai-date-prev" class="p-1 rounded-lg hover:bg-gray-100 text-gray-500">
                                <i data-lucide="chevron-left" size="16"></i>
                            </button>
                            <div id="my-qai-content-date" class="text-xs font-bold text-gray-400 text-center flex-1"></div>
                            <button type="button" onclick="changeMyQaiDate(1)" id="my-qai-date-next" class="p-1 rounded-lg hover:bg-gray-100 text-gray-500">
                                <i data-lucide="chevron-right" size="16"></i>
                            </button>
                        </div>
                        <div class="flex items-center justify-between mb-3">
                            <div class="text-sm font-bold text-gray-700">QAi評分內容</div>
                            <div id="my-qai-content-score" class="text-2xl font-black text-green-600">--</div>
                        </div>
                        <div id="my-type-stats" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 視圖：獎懲記錄 -->
        <div id="view-records" class="view-content hidden">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2 min-w-0">
                    <h2 class="font-bold text-gray-700 whitespace-nowrap">評分紀錄</h2>
                </div>
                <div id="records-actions" class="flex items-center gap-3">
                    <button id="share-btn" onclick="openShareModal()" class="text-xs text-gray-500 flex items-center gap-1">
                        <i data-lucide="share-2" size="14"></i> 分享
                    </button>
                    <button onclick="clearRecords()" id="clear-records-btn" class="text-xs text-red-500 flex items-center gap-1">
                        <i data-lucide="trash-2" size="14"></i> 清除
                    </button>
                </div>
            </div>
            <div id="records-date-nav" class="flex items-center justify-center gap-2 mb-4">
                <button onclick="changeRecordsDate(-1)" class="p-1 rounded-lg hover:bg-gray-100 text-gray-500">
                    <i data-lucide="chevron-left" size="16"></i>
                </button>
                <div id="records-date-label" class="text-xs font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded-lg whitespace-nowrap"></div>
                <button onclick="changeRecordsDate(1)" class="p-1 rounded-lg hover:bg-gray-100 text-gray-500">
                    <i data-lucide="chevron-right" size="16"></i>
                </button>
            </div>
            <div id="records-container" class="space-y-3">
                <div class="text-center py-10 text-gray-400">
                    <i data-lucide="clipboard-list" size="48" class="mx-auto mb-2 opacity-20"></i>
                    <p>目前尚無評分紀錄</p>
                </div>
            </div>
        </div>

        <!-- 視圖：統計報表 -->
        <div id="view-stats" class="view-content hidden">
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-4">
                <div class="mb-4 space-y-3">
                    <div id="filter-container" class="grid grid-cols-4 gap-2">
                        <div id="filter-role-wrapper">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">角色</label>
                            <select id="filter-role" onchange="handleFilterChange('role')" class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition text-sm">
                                <option value="">全部</option>
                            </select>
                        </div>
                        <div id="filter-company-wrapper">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">所屬公司</label>
                            <select id="filter-company" onchange="handleFilterChange('company')" class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition text-sm">
                                <option value="">全部</option>
                            </select>
                        </div>
                        <div id="filter-community-wrapper">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">服務社區</label>
                            <select id="filter-community" onchange="handleFilterChange('community')" class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition text-sm">
                                <option value="">全部</option>
                            </select>
                        </div>
                        <div id="filter-name-wrapper">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">姓名</label>
                            <select id="filter-name" onchange="handleFilterChange('name')" class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition text-sm">
                                <option value="">全部</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- 人员列表（横向滚动） -->
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">快速選擇人員</label>
                    <div id="user-list-horizontal" class="flex gap-2 overflow-x-auto pb-2"></div>
                </div>
                
                <h3 class="font-bold text-gray-700 mb-3 flex items-center gap-2">
                    <span id="selected-user-name" class="text-gray-500"></span>
                    QAi評分
                    <span id="stats-qai-score" class="text-green-600">--</span>
                </h3>
                <div id="type-stats" class="space-y-2"></div>
                <button onclick="openAddTypeModal()" class="mt-4 w-full flex items-center justify-center gap-2 p-3 border-2 border-dashed border-gray-300 text-gray-500 rounded-xl hover:border-green-500 hover:text-green-500 transition">
                    <i data-lucide="plus" size="18"></i>
                    <span>新增類型</span>
                </button>
            </div>
        </div>

        <!-- 視圖：資料 -->
        <div id="view-data" class="view-content hidden">
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-4">
                <h2 class="font-bold text-gray-700 mb-4">人員資料</h2>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-gray-200">
                                <th class="text-left py-2 px-1 text-xs font-bold text-gray-500">所屬公司</th>
                                <th class="text-left py-2 px-1 text-xs font-bold text-gray-500">服務社區</th>
                                <th class="text-left py-2 px-1 text-xs font-bold text-gray-500">角色</th>
                                <th class="text-left py-2 px-1 text-xs font-bold text-gray-500">姓名</th>
                                <th class="text-left py-2 px-1 text-xs font-bold text-gray-500">QAi評分</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body">
                            <!-- 表格內容將在這裡動態生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- 成功提示彈窗 -->
    <div id="success-modal" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center hidden p-6 overflow-y-auto">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs text-center shadow-2xl animate-in zoom-in duration-300 my-auto">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check-circle-2" size="48"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-1">新增成功！</h3>
            <p class="text-gray-600 mb-4">罰扣記錄已保存</p>
            <button onclick="closeModal()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-red-200">確定</button>
        </div>
    </div>

    <!-- 編輯罰扣彈窗 -->
    <div id="edit-modal" class="fixed inset-0 bg-black/50 z-[101] hidden p-4 flex items-center justify-center overflow-y-auto">
        <div class="w-full max-w-md mx-auto bg-white rounded-2xl shadow-2xl my-4">
            <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 sticky top-0 bg-white z-10">
                <div class="font-black text-gray-800 text-sm">編輯獎懲</div>
                <button onclick="closeEditModal()" class="p-1 rounded-full hover:bg-gray-100 text-gray-500">
                    <i data-lucide="x" size="18"></i>
                </button>
            </div>
            <div class="p-4 space-y-4 max-h-[80vh] overflow-y-auto">
                <input type="hidden" id="edit-id" value="">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">人員姓名</label>
                    <select id="edit-name" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition">
                        <option value="">請選擇人員</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">獎懲類別</label>
                    <select id="edit-category" onchange="updateTypeOptions()" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition">
                        <option value="">請選擇類別</option>
                        <option value="reward">獎勵</option>
                        <option value="penalty">懲處</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">獎懲類型</label>
                    <select id="edit-type" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition">
                        <option value="">請先選擇類別</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">統計類型</label>
                    <select id="edit-stat-type" onchange="updateEditStatSubTypeOptions()" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition">
                        <option value="">請選擇統計類型</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">統計子類型</label>
                    <select id="edit-stat-subtype" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition">
                        <option value="">請選擇統計子類型（可選）</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">計量方式</label>
                    <select id="edit-unit" onchange="updateAmountLabel()" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition">
                        <option value="">請選擇計量方式</option>
                        <option value="points">點數</option>
                        <option value="money">金額</option>
                    </select>
                </div>
                <div>
                    <label id="edit-amount-label" class="block text-xs font-bold text-gray-400 uppercase mb-1">數值</label>
                    <input type="number" id="edit-amount" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">事由說明</label>
                    <textarea id="edit-reason" rows="3" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">上傳圖片</label>
                    <div id="edit-image-upload" class="border-2 border-dashed border-gray-200 rounded-lg p-4">
                        <input type="file" id="edit-image-input" accept="image/*" multiple class="hidden">
                        <label for="edit-image-input" class="cursor-pointer flex flex-col items-center justify-center">
                            <i data-lucide="upload" class="text-gray-400 mb-2"></i>
                            <span class="text-sm text-gray-500">點擊上傳圖片</span>
                            <span class="text-xs text-gray-400 mt-1">最多3張</span>
                        </label>
                        <div id="edit-image-preview" class="grid grid-cols-3 gap-2 mt-4"></div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="closeEditModal()" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-200 transition">取消</button>
                    <button onclick="saveEdit()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 確認彈窗 -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/50 z-[115] hidden p-6 flex items-center justify-center overflow-y-auto">
        <div class="bg-white rounded-2xl w-full max-w-xs shadow-2xl overflow-hidden my-auto">
            <div class="px-5 py-4 border-b border-gray-100">
                <div id="confirm-title" class="font-black text-gray-800 text-base"></div>
                <div id="confirm-message" class="text-sm text-gray-600 mt-1 whitespace-pre-wrap"></div>
            </div>
            <div class="px-5 py-4 flex gap-2">
                <button onclick="confirmModalCancel()" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-200 transition">取消</button>
                <button onclick="confirmModalOk()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition">確認</button>
            </div>
        </div>
    </div>

    <!-- 分享彈窗 -->
    <div id="share-modal" class="fixed inset-0 bg-black/50 z-[114] hidden p-6 flex items-center justify-center overflow-y-auto">
        <div class="bg-white rounded-2xl w-full max-w-xs shadow-2xl overflow-hidden my-auto">
            <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                <div class="font-black text-gray-800 text-base">分享獎懲記錄</div>
                <button onclick="closeShareModal()" class="p-1 rounded-full hover:bg-gray-100 text-gray-500">
                    <i data-lucide="x" size="18"></i>
                </button>
            </div>
            <div class="px-5 py-4">
                <div id="share-community-name" class="text-sm font-bold text-gray-800 mb-3"></div>
                <div class="mt-3">
                    <div class="text-xs font-bold text-gray-400 uppercase mb-1">說明</div>
                    <div class="text-xs text-gray-500">此功能用於分享統計報表</div>
                </div>
            </div>
            <div class="px-5 py-4 border-t border-gray-100">
                <button onclick="closeShareModal()" class="w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-200 transition">關閉</button>
            </div>
        </div>
    </div>

    <!-- 公告彈窗 -->
    <div id="notice-modal" class="fixed inset-0 bg-black/50 z-[116] hidden p-4 flex items-start justify-center overflow-y-auto" style="padding-top: 10vh; padding-bottom: 10vh;">
        <div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden my-auto">
            <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white z-10">
                <div class="font-black text-gray-800 text-base">獎懲公告</div>
                <button onclick="closeNoticeModal()" class="p-1 rounded-full hover:bg-gray-100 text-gray-500">
                    <i data-lucide="x" size="18"></i>
                </button>
            </div>
            <div id="notice-content" class="p-5 overflow-y-auto" style="max-height: 70vh;">
                <!-- 公告內容將在這裡動態生成 -->
            </div>
            <div class="px-5 py-4 border-t border-gray-100 sticky bottom-0 bg-white space-y-2">
                <button onclick="shareToLine()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition flex items-center justify-center gap-2">
                    <i data-lucide="message-circle" size="18"></i>
                    Line 分享
                </button>
                <button onclick="closeNoticeModal()" class="w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-200 transition">關閉</button>
            </div>
        </div>
    </div>

    <!-- 新增類型彈窗 -->
    <div id="add-type-modal" class="fixed inset-0 bg-black/50 z-[117] hidden p-4 flex items-center justify-center overflow-y-auto">
        <div class="bg-white rounded-2xl w-full max-w-xs shadow-2xl my-auto">
            <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                <div class="font-black text-gray-800 text-base">新增類型</div>
                <button onclick="closeAddTypeModal()" class="p-1 rounded-full hover:bg-gray-100 text-gray-500">
                    <i data-lucide="x" size="18"></i>
                </button>
            </div>
            <div class="p-5">
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">類型名稱</label>
                    <input type="text" id="new-type-name" placeholder="請輸入類型名稱" 
                           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition">
                </div>
                <div class="flex gap-2">
                    <button onclick="closeAddTypeModal()" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-200 transition">取消</button>
                    <button onclick="saveNewType()" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition">確認</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增子類型彈窗 -->
    <div id="add-subtype-modal" class="fixed inset-0 bg-black/50 z-[118] hidden p-4 flex items-center justify-center overflow-y-auto">
        <div class="bg-white rounded-2xl w-full max-w-xs shadow-2xl my-auto">
            <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                <div class="font-black text-gray-800 text-base">新增子類型</div>
                <button onclick="closeAddSubTypeModal()" class="p-1 rounded-full hover:bg-gray-100 text-gray-500">
                    <i data-lucide="x" size="18"></i>
                </button>
            </div>
            <div class="p-5">
                <div class="mb-2 text-sm text-gray-600">為「<span id="subtype-parent-name"></span>」新增子類型</div>
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">子類型名稱</label>
                    <input type="text" id="new-subtype-name" placeholder="請輸入子類型名稱" 
                           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition">
                </div>
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">數值</label>
                    <input type="number" id="new-subtype-value" placeholder="請輸入數值" step="1"
                           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition">
                </div>
                <div class="flex gap-2">
                    <button onclick="closeAddSubTypeModal()" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-200 transition">取消</button>
                    <button onclick="saveNewSubType()" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition">確認</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 編輯類型彈窗 -->
    <div id="edit-type-modal" class="fixed inset-0 bg-black/50 z-[119] hidden p-4 flex items-center justify-center overflow-y-auto">
        <div class="bg-white rounded-2xl w-full max-w-xs shadow-2xl my-auto">
            <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                <div class="font-black text-gray-800 text-base">編輯類型</div>
                <button onclick="closeEditTypeModal()" class="p-1 rounded-full hover:bg-gray-100 text-gray-500">
                    <i data-lucide="x" size="18"></i>
                </button>
            </div>
            <div class="p-5">
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">類型名稱</label>

    <script>
        lucide.createIcons();

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-attendance-app';

        let fbUser = null;
        let dbUser = null;
        let selectedCommunityId = '';
        let selectedCommunityName = '';
        let db = null;
        let settingsDocRef = null;
        let recordsUnsub = null;
        let settingsUnsub = null;
        let usersUnsub = null;
        let rolesUnsub = null;

        let records = [];
        let recordAttendance = [];
        let recordSchedules = [];
        let selectedRecordsDate = new Date();
        let selectedMyQaiDate = new Date();
        let myQaiAvailableDateKeys = [];
        let canManageSettings = false;
        let pendingConfirmAction = null;
        let isPublicView = false;
        let editRecordId = null;
        let communityUsers = [];
        let roles = [];
        let penaltyImages = []; // 存儲新增時的圖片
        let editImages = []; // 存儲編輯時的圖片
        let statTypes = ['出勤', '工作', '態度']; // 統計類型
        let statSubTypes = {}; // 統計子類型 { 主類型: [子類型1, 子類型2] }
        let statTypeValues = {}; // 統計類型數值 { 類型名: 數值 }
        let statSubTypeValues = {}; // 統計子類型數值 { 類型名: { 子類型名: 數值 } }
        let selectedUserName = ''; // 當前選擇的用戶
        let userStatsData = {}; // 每個用戶的獨立設置 { 用戶名: { types, subTypes, typeValues, subTypeValues } }
        let currentSettings = null; // 當前設置
        
        // 筛选相关变量
        let allCommunities = []; // 所有社区列表
        
        // 定义角色类型和显示规则
        const ROLES_HIDE_COMMUNITY = ['系統管理員', '人事', '物業', '幹部', '員工']; // 这些角色不显示服务社区
        const ROLES_HIDE_COMPANY = ['總幹事', '秘書', '清潔', '機電', '保全']; // 这些角色不显示所属公司
        const ROLES_TO_EXCLUDE = ['管理層']; // 这些角色不显示在筛选中
        
        // 根据角色更新筛选显示
        function updateFilterVisibility() {
            const roleValue = document.getElementById('filter-role')?.value || '';
            const companyWrapper = document.getElementById('filter-company-wrapper');
            const communityWrapper = document.getElementById('filter-community-wrapper');
            const filterContainer = document.getElementById('filter-container');
            
            if (!roleValue) {
                // 没有选择角色，显示所有筛选
                if (companyWrapper) companyWrapper.style.display = 'block';
                if (communityWrapper) communityWrapper.style.display = 'block';
                if (filterContainer) filterContainer.className = 'grid grid-cols-4 gap-2';
            } else if (ROLES_HIDE_COMMUNITY.includes(roleValue)) {
                // 选择了需要隐藏服务社区的角色
                if (companyWrapper) companyWrapper.style.display = 'block';
                if (communityWrapper) communityWrapper.style.display = 'none';
                if (filterContainer) filterContainer.className = 'grid grid-cols-3 gap-2';
                
                // 清空社区筛选值
                const communitySelect = document.getElementById('filter-community');
                if (communitySelect) communitySelect.value = '';
            } else if (ROLES_HIDE_COMPANY.includes(roleValue)) {
                // 选择了需要隐藏所属公司的角色
                if (companyWrapper) companyWrapper.style.display = 'none';
                if (communityWrapper) communityWrapper.style.display = 'block';
                if (filterContainer) filterContainer.className = 'grid grid-cols-3 gap-2';
                
                // 清空公司筛选值
                const companySelect = document.getElementById('filter-company');
                if (companySelect) companySelect.value = '';
            }
        }
        
        // 获取符合当前筛选条件的用户
        function getFilteredUsers() {
            let users = [...communityUsers];
            
            // 社区筛选
            const communityVal = document.getElementById('filter-community')?.value || '';
            if (communityVal) {
                users = users.filter(u => {
                    // 首先查找匹配的社区
                    const matchedCommunity = allCommunities.find(c => 
                        (c.name || c.id || '') === communityVal
                    );
                    
                    if (matchedCommunity) {
                        const communityId = String(matchedCommunity.id).trim().toUpperCase();
                        // 检查用户的 communityIds 是否包含这个社区ID
                        const userCommunityIds = Array.isArray(u.communityIds) ? u.communityIds : 
                            (u.communityId ? [u.communityId] : []);
                        const hasMatchingId = userCommunityIds.some(id => 
                            String(id).trim().toUpperCase() === communityId
                        );
                        if (hasMatchingId) {
                            return true;
                        }
                    }
                    
                    // 也检查社区名称匹配
                    const userCommunityName = u.communityName || u.community || '';
                    return userCommunityName === communityVal;
                });
            }
            
            // 公司筛选
            const companyVal = document.getElementById('filter-company')?.value || '';
            if (companyVal) {
                users = users.filter(u => (u.company || '') === companyVal);
            }
            
            // 角色筛选
            const roleVal = document.getElementById('filter-role')?.value || '';
            if (roleVal) {
                users = users.filter(u => {
                    const userRoleId = u.role || '';
                    // 检查硬编码的系统管理员角色
                    if (roleVal === '系統管理員' && userRoleId === 'admin') {
                        return true;
                    }
                    const roleObj = roles.find(r => r.id === userRoleId);
                    const userRoleName = roleObj ? (roleObj.name || roleObj.id) : '';
                    return userRoleName === roleVal;
                });
            }
            
            // 姓名筛选
            const nameVal = document.getElementById('filter-name')?.value || '';
            if (nameVal) {
                users = users.filter(u => (u.name || u.email || '') === nameVal);
            }
            
            // 去重，根据用户姓名
            const seenNames = new Set();
            const uniqueUsers = users.filter(user => {
                const userName = user.name || user.email || '';
                if (seenNames.has(userName)) return false;
                seenNames.add(userName);
                return true;
            });
            
            return uniqueUsers;
        }
        
        // 更新所有筛选选项，支持关联
        function updateFilterOptions(preserveValues = true) {
            // 保存当前选中的值
            const currentCommunity = preserveValues ? document.getElementById('filter-community')?.value : '';
            const currentCompany = preserveValues ? document.getElementById('filter-company')?.value : '';
            const currentRole = preserveValues ? document.getElementById('filter-role')?.value : '';
            const currentName = preserveValues ? document.getElementById('filter-name')?.value : '';
            
            // 更新公司筛选选项 - 从所有用户数据中提取
            const companySelect = document.getElementById('filter-company');
            if (companySelect) {
                let optionsHtml = '<option value="">全部</option>';
                const companies = [...new Set(
                    communityUsers.map(u => u.company || '').filter(c => c)
                )];
                companies.sort();
                companies.forEach(company => {
                    optionsHtml += `<option value="${escapeHtml(company)}">${escapeHtml(company)}</option>`;
                });
                companySelect.innerHTML = optionsHtml;
                if (currentCompany) companySelect.value = currentCompany;
            }
            
            // 更新社区筛选选项 - 从 allCommunities 中获取所有社区
            const communitySelect = document.getElementById('filter-community');
            if (communitySelect) {
                let optionsHtml = '<option value="">全部</option>';
                const communityNames = [...new Set(
                    allCommunities.map(c => c.name || c.id || '').filter(c => c)
                )];
                communityNames.sort();
                communityNames.forEach(communityName => {
                    optionsHtml += `<option value="${escapeHtml(communityName)}">${escapeHtml(communityName)}</option>`;
                });
                communitySelect.innerHTML = optionsHtml;
                if (currentCommunity) communitySelect.value = currentCommunity;
            }
            
            // 更新角色筛选选项 - 从所有角色中，排除管理层，并添加硬编码的系统管理员
            const roleSelect = document.getElementById('filter-role');
            if (roleSelect) {
                let optionsHtml = '<option value="">全部</option>';
                // 先添加硬编码的系统管理员角色
                optionsHtml += '<option value="系統管理員">系統管理員</option>';
                roles.forEach(role => {
                    const roleName = role.name || role.id;
                    // 排除管理层角色
                    if (!ROLES_TO_EXCLUDE.includes(roleName) && roleName !== '系統管理員') {
                        optionsHtml += `<option value="${escapeHtml(roleName)}">${escapeHtml(roleName)}</option>`;
                    }
                });
                roleSelect.innerHTML = optionsHtml;
                if (currentRole) roleSelect.value = currentRole;
            }
            
            // 获取符合当前筛选条件的用户（用于姓名筛选）
            const filteredUsers = getFilteredUsers();
            
            // 更新姓名筛选选项
            const nameSelect = document.getElementById('filter-name');
            if (nameSelect) {
                let optionsHtml = '<option value="">全部</option>';
                const names = [...new Set(
                    filteredUsers.map(u => u.name || u.email || '').filter(n => n)
                )];
                names.sort();
                names.forEach(name => {
                    optionsHtml += `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`;
                });
                nameSelect.innerHTML = optionsHtml;
                if (currentName) nameSelect.value = currentName;
            }
            
            // 更新筛选显示状态
            updateFilterVisibility();
        }
        
        // 处理筛选变更
        function handleFilterChange(changedFilter) {
            // 更新其他筛选选项
            updateFilterOptions(true);
            // 重新渲染人员列表
            renderUserList();
            // 重新渲染统计
            renderStats();
        }
        
        // 渲染人员列表（横向滚动）
        function renderUserList() {
            const userListEl = document.getElementById('user-list-horizontal');
            if (!userListEl) return;
            
            const currentNameFilter = document.getElementById('filter-name')?.value || '';
            const filteredUsers = getFilteredUsers();
            
            // 去重，根据用户姓名
            const seenNames = new Set();
            const uniqueUsers = filteredUsers.filter(user => {
                const userName = user.name || user.email || '';
                if (seenNames.has(userName)) return false;
                seenNames.add(userName);
                return true;
            });
            
            // 添加"全部"选项
            let html = `
                <button onclick="selectUser('')" class="flex-shrink-0 px-4 py-2 rounded-full border ${!currentNameFilter ? 'border-green-500 bg-green-50' : 'border-gray-200 hover:border-gray-300 hover:bg-gray-50'} transition whitespace-nowrap">
                    <span class="text-sm font-medium ${!currentNameFilter ? 'text-green-600' : 'text-gray-700'}">全部</span>
                </button>
            `;
            
            // 添加用户列表
            uniqueUsers.forEach(user => {
                const userName = user.name || user.email || '';
                const isSelected = userName === currentNameFilter;
                // 处理角色显示，支持硬编码的系统管理员角色
                let roleName = '';
                const userRoleId = user.role || '';
                if (userRoleId === 'admin') {
                    roleName = '系統管理員';
                } else {
                    const roleObj = roles.find(r => r.id === userRoleId);
                    roleName = roleObj?.name || '';
                }
                
                html += `
                    <button onclick="selectUser('${escapeHtml(userName)}')" class="flex-shrink-0 px-4 py-2 rounded-full border ${isSelected ? 'border-green-500 bg-green-50' : 'border-gray-200 hover:border-gray-300 hover:bg-gray-50'} transition whitespace-nowrap">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-medium ${isSelected ? 'text-green-600' : 'text-gray-700'}">
                                ${escapeHtml(userName)}
                            </span>
                            ${roleName ? `<span class="text-xs text-gray-400">${escapeHtml(roleName)}</span>` : ''}
                        </div>
                    </button>
                `;
            });
            
            userListEl.innerHTML = html;
        }
        
        // 选择用户进行筛选
        function selectUser(userName) {
            // 保存当前用户的数据
            if (selectedUserName && statTypes.length > 0) {
                userStatsData[selectedUserName] = {
                    types: [...statTypes],
                    subTypes: { ...statSubTypes },
                    typeValues: { ...statTypeValues },
                    subTypeValues: { ...statSubTypeValues }
                };
            }
            
            // 设置新的选中用户
            selectedUserName = userName || '';
            
            // 更新标题显示
            const userNameEl = document.getElementById('selected-user-name');
            if (userNameEl) {
                userNameEl.textContent = selectedUserName ? selectedUserName + ' -' : '';
            }
            
            // 加载新用户的数据，如果有的话
            if (selectedUserName && userStatsData[selectedUserName]) {
                const userData = userStatsData[selectedUserName];
                statTypes = [...userData.types];
                statSubTypes = { ...userData.subTypes };
                statTypeValues = { ...userData.typeValues };
                statSubTypeValues = { ...userData.subTypeValues };
            } else {
                // 如果没有该用户的数据，使用默认值
                initDefaultStats();
            }
            
            // 更新筛选和渲染
            const nameSelect = document.getElementById('filter-name');
            if (nameSelect) {
                nameSelect.value = userName || '';
                handleFilterChange('name');
            }
            
            // 重新渲染统计
            renderStats();
        }
        
        // 初始化默认的统计设置
        function initDefaultStats() {
            statTypes = ['出勤', '工作'];
            statTypeValues = { '出勤': 40, '工作': 60 };
            statSubTypes = {
                '出勤': ['上班打卡', '下班打卡', '無遲到', '無早退']
            };
            statSubTypeValues = {
                '出勤': {
                    '上班打卡': 10,
                    '下班打卡': 10,
                    '無遲到': 10,
                    '無早退': 10
                }
            };
        }
        function adjustSubtypeValues(parentType, newSubTypeValues, parentValueParam, subTypesParam) {
            const parentValue = parentValueParam !== undefined ? parentValueParam : statTypeValues[parentType];
            if (parentValue === undefined) return newSubTypeValues;
            
            const subTypes = subTypesParam || statSubTypes[parentType] || [];
            if (subTypes.length === 0) return newSubTypeValues;
            
            // 计算当前子类型数值总和
            let currentTotal = 0;
            const valuesToUse = { ...newSubTypeValues[parentType] };
            subTypes.forEach(st => {
                if (valuesToUse[st] !== undefined) {
                    currentTotal += valuesToUse[st];
                }
            });
            
            // 如果总和已经等于父类型数值，直接返回
            if (currentTotal === parentValue) return newSubTypeValues;
            
            // 如果总和不等于父类型数值，计算差值并调整
            const diff = parentValue - currentTotal;
            // 先尝试给第一个子类型调整
            if (subTypes.length > 0) {
                const firstSubType = subTypes[0];
                if (valuesToUse[firstSubType] === undefined) {
                    valuesToUse[firstSubType] = 0;
                }
                valuesToUse[firstSubType] += diff;
                // 确保不为负数
                if (valuesToUse[firstSubType] < 0) {
                    valuesToUse[firstSubType] = 0;
                }
            }
            
            // 返回调整后的数值
            return {
                ...newSubTypeValues,
                [parentType]: valuesToUse
            };
        }

        function normalizeKey(v) {
            return String(v || '').replace(/\uFEFF/g, '').trim();
        }

        function escapeHtml(s) {
            return String(s || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function computeQaiScoreByUserName(userName) {
            const key = normalizeKey(userName);
            const userData = key ? userStatsData[key] : null;
            if (!userData || typeof userData !== 'object') return 100;
            const values = (userData && userData.typeValues && typeof userData.typeValues === 'object') ? userData.typeValues : null;
            if (!values) return 100;
            const sum = Object.values(values).reduce((acc, val) => {
                const n = Number(val);
                if (!Number.isFinite(n)) return acc;
                return acc + n;
            }, 0);
            const score = Math.round(sum);
            if (!Number.isFinite(score)) return 100;
            return Math.max(0, Math.min(999, score));
        }

        function computeQaiScoreFromCurrentStats() {
            if (!Array.isArray(statTypes) || statTypes.length === 0) return 100;
            let sum = 0;
            statTypes.forEach(type => {
                let typeValue;
                if (statTypeValues && statTypeValues[type] !== undefined) {
                    typeValue = statTypeValues[type];
                } else {
                    typeValue = Math.round(100 / statTypes.length);
                }
                const n = Number(typeValue);
                if (!Number.isFinite(n)) return;
                sum += n;
            });
            const score = Math.round(sum);
            if (!Number.isFinite(score)) return 100;
            return Math.max(0, Math.min(999, score));
        }

        function setQaiScoreColor(el, score) {
            if (!el) return;
            el.classList.remove('text-green-600', 'text-yellow-600', 'text-red-600');
            el.classList.add(score >= 80 ? 'text-green-600' : (score >= 60 ? 'text-yellow-600' : 'text-red-600'));
        }

        function renderMyProfile() {
            const nameEl = document.getElementById('my-name');
            const scoreEl = document.getElementById('my-qai-content-score');
            const imgEl = document.getElementById('my-avatar-img');
            const fallbackEl = document.getElementById('my-avatar-fallback');
            if (!nameEl || !scoreEl) return;

            selectedMyQaiDate.setHours(0, 0, 0, 0);
            updateMyQaiDateLabel();
            updateMyQaiDateNavButtons();

            const myEmail = normalizeKey(dbUser?.email || fbUser?.email || '');
            const myId = normalizeKey(dbUser?.id || '');
            const myName = normalizeKey(dbUser?.name || fbUser?.displayName || '');

            const userInfo = (communityUsers || []).find(u => {
                if (!u) return false;
                if (myId && String(u.id || '').trim() === myId) return true;
                if (myEmail && String(u.email || '').trim() === myEmail) return true;
                if (myName && String(u.name || '').trim() === myName) return true;
                return false;
            }) || {};

            const displayName = normalizeKey(userInfo?.name || dbUser?.name || fbUser?.displayName || fbUser?.email || '使用者');
            nameEl.textContent = displayName;

            const avatarUrl = normalizeKey(
                userInfo?.avatarUrl ||
                userInfo?.avatar ||
                userInfo?.photoURL ||
                userInfo?.photo ||
                dbUser?.avatarUrl ||
                dbUser?.photoURL ||
                fbUser?.photoURL ||
                ''
            );

            if (imgEl && fallbackEl) {
                if (avatarUrl) {
                    imgEl.onerror = () => {
                        imgEl.classList.add('hidden');
                        fallbackEl.classList.remove('hidden');
                    };
                    imgEl.src = avatarUrl;
                    imgEl.classList.remove('hidden');
                    fallbackEl.classList.add('hidden');
                } else {
                    imgEl.classList.add('hidden');
                    fallbackEl.classList.remove('hidden');
                }
            }

            const score = computeQaiScoreFromCurrentStats();
            scoreEl.textContent = String(score);
            setQaiScoreColor(scoreEl, score);
        }

        // 圖片壓縮函數
        function compressImage(file, maxWidth = 600, maxHeight = 600, quality = 0.5) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        // 計算縮放比例
                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round((width * maxHeight) / height);
                                height = maxHeight;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedDataUrl);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // 圖片上傳處理函數
        function setupImageUpload(inputId, previewId, isEdit = false) {
            const input = document.getElementById(inputId);
            if (!input) return;
            
            input.onchange = async (e) => {
                const images = isEdit ? editImages : penaltyImages;
                const files = Array.from(e.target.files);
                const remainingSlots = 3 - images.length;
                
                if (files.length > remainingSlots) {
                    alert(`最多只能上傳3張圖片，還可以上傳${remainingSlots}張`);
                    files.splice(remainingSlots);
                }
                
                for (const file of files) {
                    if (file.type.startsWith('image/')) {
                        try {
                            // 檢查文件大小
                            if (file.size > 5 * 1024 * 1024) { // 5MB
                                alert('圖片大小不能超過5MB，請選擇較小的圖片');
                                continue;
                            }
                            
                            const compressedImage = await compressImage(file);
                            images.push(compressedImage);
                            renderImagePreview(previewId, isEdit);
                        } catch (error) {
                            console.error('圖片壓縮失敗:', error);
                            alert('圖片處理失敗，請重試');
                        }
                    }
                }
                
                input.value = ''; // 重置input
            };
        }

        function formatDateLabel(d) {
            if (!d) return '';
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const w = ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
            return `${y}/${m}/${day} (週${w})`;
        }

        function formatMonthLabel(d) {
            if (!d) return '';
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            return `${y}-${m}`;
        }

        function getConfiguredTypeValue(typeName) {
            if (statTypeValues[typeName] !== undefined) {
                const n = Number(statTypeValues[typeName] || 0);
                return Number.isFinite(n) ? n : 0;
            }
            return statTypes.length > 0 ? Math.round(100 / statTypes.length) : 0;
        }

        function getConfiguredSubTypeValue(typeName, subTypeName) {
            const n = Number(statSubTypeValues[typeName]?.[subTypeName] || 0);
            return Number.isFinite(n) ? n : 0;
        }

        function getRecordDateValue(raw) {
            if (!raw) return null;
            if (raw.toDate) return raw.toDate();
            if (raw.seconds) return new Date(raw.seconds * 1000);
            return new Date(raw);
        }

        function getScoredScheduleForDate(dateKey, scheduleItems = []) {
            return scheduleItems.find(r =>
                String(r.date || '').trim() === dateKey &&
                ['work', 'duty', 'card'].includes(String(r.type || '').trim())
            ) || null;
        }

        function getAttendanceScoresForDate(dateKey, attendanceItems = [], scheduleItems = []) {
            const schedule = getScoredScheduleForDate(dateKey, scheduleItems);
            if (!schedule) return null;
            const rows = attendanceItems
                .filter(r => {
                    const logicDate = String(r.logicDate || '').trim();
                    if (logicDate) return logicDate === dateKey;
                    const d = getRecordDateValue(r.timestamp || r.createdAt);
                    return d && !Number.isNaN(d.getTime()) && formatYmd(d) === dateKey;
                })
                .map(r => ({ ...r, _date: getRecordDateValue(r.timestamp || r.createdAt) }))
                .filter(r => r._date && !Number.isNaN(r._date.getTime()))
                .sort((a, b) => a._date - b._date);

            const inTypes = ['in', 'late_in', 'work_in', 'duty_in'];
            const outTypes = ['out', 'late_out', 'work_out', 'duty_out'];
            const firstIn = rows.find(r => inTypes.includes(String(r.type || '').trim()));
            let lastOut = null;
            for (let i = rows.length - 1; i >= 0; i--) {
                const t = String(rows[i].type || '').trim();
                if (outTypes.includes(t)) {
                    lastOut = rows[i];
                    break;
                }
            }

            const scores = {
                '上班打卡': firstIn ? getConfiguredSubTypeValue('出勤', '上班打卡') : 0,
                '下班打卡': lastOut ? getConfiguredSubTypeValue('出勤', '下班打卡') : 0,
                '無遲到': 0,
                '無早退': 0
            };

            if (schedule?.startTime && schedule?.endTime) {
                const [sh, sm] = String(schedule.startTime).split(':').map(Number);
                const [eh, em] = String(schedule.endTime).split(':').map(Number);
                const baseDate = parseYmdToDate(dateKey);
                const start = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(), sh || 0, sm || 0, 0, 0);
                const end = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(), eh || 0, em || 0, 0, 0);
                const crossDay = schedule.crossDay === true || ((eh || 0) * 60 + (em || 0)) < ((sh || 0) * 60 + (sm || 0));
                if (crossDay) end.setDate(end.getDate() + 1);

                const now = new Date();
                scores['無遲到'] = firstIn ? (firstIn._date <= start ? getConfiguredSubTypeValue('出勤', '無遲到') : 0) : (now < start ? getConfiguredSubTypeValue('出勤', '無遲到') : 0);
                scores['無早退'] = lastOut ? (lastOut._date >= end ? getConfiguredSubTypeValue('出勤', '無早退') : 0) : (now < end ? getConfiguredSubTypeValue('出勤', '無早退') : 0);
            }

            return scores;
        }

        function computeDailyScoreForDate(dateKey, penaltyItems = [], attendanceItems = [], scheduleItems = []) {
            const schedule = getScoredScheduleForDate(dateKey, scheduleItems);
            if (!schedule) return null;
            const attendanceScores = getAttendanceScoresForDate(dateKey, attendanceItems, scheduleItems);
            const attendanceTotal = attendanceScores ? Object.values(attendanceScores).reduce((sum, val) => sum + Number(val || 0), 0) : 0;
            const myNameKey = normalizeKey(dbUser?.name || fbUser?.displayName || '');
            const myDayRecords = penaltyItems.filter(r => {
                if (!myNameKey) return false;
                if (normalizeKey(r.name || '') !== myNameKey) return false;
                const raw = r.createdAt;
                if (!raw) return false;
                const d = raw.toDate ? raw.toDate() : new Date(raw);
                if (!d || Number.isNaN(d.getTime())) return false;
                return formatYmd(d) === dateKey;
            });

            const penaltyDelta = myDayRecords.reduce((sum, r) => {
                const typeName = normalizeKey(r.statType || r.type || '');
                if (typeName === '出勤') return sum;
                if (normalizeKey(r.unit || '') !== 'points') return sum;
                const amount = Number(r.amount || 0);
                if (!Number.isFinite(amount)) return sum;
                return sum + (normalizeKey(r.category || 'penalty') === 'reward' ? amount : -amount);
            }, 0);

            const baseTotal = statTypes.reduce((sum, t) => sum + getConfiguredTypeValue(t), 0);
            const attendanceBase = getConfiguredTypeValue('出勤');
            return (baseTotal - attendanceBase) + attendanceTotal + penaltyDelta;
        }

        function formatYmd(d) {
            if (!d) return '';
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function parseYmdToDate(ymd) {
            const parts = String(ymd || '').split('-');
            const y = Number(parts[0]);
            const m = Number(parts[1]);
            const d = Number(parts[2]);
            const dt = new Date(y, (m || 1) - 1, d || 1);
            dt.setHours(0, 0, 0, 0);
            return dt;
        }

        function formatDateTime(d) {
            if (!d) return '';
            const date = d.toDate ? d.toDate() : new Date(d);
            return date.toLocaleString('zh-TW');
        }

        function subscribeRecordsForDate(d) {
            if (!settingsDocRef) return;
            if (recordsUnsub) { try { recordsUnsub(); } catch {} recordsUnsub = null; }

            const start = new Date(d.getFullYear(), d.getMonth(), 1, 0, 0, 0, 0);
            const end = new Date(d.getFullYear(), d.getMonth() + 1, 1, 0, 0, 0, 0);
            const startTs = firebase.firestore.Timestamp.fromDate(start);
            const endTs = firebase.firestore.Timestamp.fromDate(end);
            const myNameKey = normalizeKey(dbUser?.name || fbUser?.displayName || '');
            const myUserId = String(dbUser?.id || '').trim();

            const recordsQuery = settingsDocRef
                .collection('penalties')
                .where('createdAt', '>=', startTs)
                .where('createdAt', '<', endTs)
                .orderBy('createdAt', 'desc')
                .limit(500);

            recordsUnsub = recordsQuery.onSnapshot(async (snapshot) => {
                const list = [];
                snapshot.forEach((doc) => list.push({ id: doc.id, ...doc.data() }));
                records = list.filter(item => !myNameKey || normalizeKey(item.name || '') === myNameKey);

                recordAttendance = [];
                recordSchedules = [];
                if (db && myUserId) {
                    try {
                        const attendanceRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('attendance');
                        const schedulesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('schedules');
                        const [attendanceSnap, schedulesSnap] = await Promise.all([
                            attendanceRef.where('userId', '==', myUserId).limit(1000).get(),
                            schedulesRef.where('userId', '==', myUserId).limit(1000).get()
                        ]);
                        attendanceSnap.forEach(doc => recordAttendance.push({ id: doc.id, ...doc.data() }));
                        schedulesSnap.forEach(doc => recordSchedules.push({ id: doc.id, ...doc.data() }));
                    } catch (e) {
                        console.error('讀取個人評分來源失敗:', e);
                    }
                }

                updatePenaltyCount();
                if (!document.getElementById('view-records')?.classList.contains('hidden')) renderRecords();
            }, () => {
                records = [];
                recordAttendance = [];
                recordSchedules = [];
                updatePenaltyCount();
                const container = document.getElementById('records-container');
                if (container) {
                    container.innerHTML = `<div class="text-center py-10 text-gray-400"><i data-lucide="alert-triangle" size="48" class="mx-auto mb-2 opacity-20"></i><p>無法讀取評分紀錄</p></div>`;
                    lucide.createIcons();
                }
            });
        }

        async function addPenalty() {
            const name = normalizeKey(document.getElementById('penalty-name')?.value);
            const category = normalizeKey(document.getElementById('penalty-category')?.value);
            const type = normalizeKey(document.getElementById('penalty-type')?.value);
            const statType = normalizeKey(document.getElementById('penalty-stat-type')?.value);
            const statSubType = normalizeKey(document.getElementById('penalty-stat-subtype')?.value);
            const unit = normalizeKey(document.getElementById('penalty-unit')?.value);
            const amount = Number(document.getElementById('penalty-amount')?.value);
            const reason = normalizeKey(document.getElementById('penalty-reason')?.value);

            if (!name || !category || !type || !statType || !unit || !amount) {
                alert('請填寫完整資訊');
                return;
            }

            if (!settingsDocRef) return;

            // 找到按鈕並顯示載入狀態
            const button = document.querySelector('button[onclick="addPenalty()"]');
            const originalText = button.innerHTML;
            button.innerHTML = '<i data-lucide="loader-2" class="animate-spin mr-2"></i> 保存中...';
            button.disabled = true;
            lucide.createIcons();

            try {
                await settingsDocRef.collection('penalties').add({
                    name: name,
                    category: category,
                    type: type,
                    statType: statType,
                    statSubType: statSubType,
                    unit: unit,
                    amount: amount,
                    reason: reason,
                    images: penaltyImages, // 保存圖片
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    createdBy: dbUser?.uid || 'anonymous'
                });

                document.getElementById('penalty-name').value = '';
                document.getElementById('penalty-category').value = '';
                document.getElementById('penalty-type').innerHTML = '<option value="">請先選擇類別</option>';
                document.getElementById('penalty-stat-type').value = '';

        function renderRecords() {
            const container = document.getElementById('records-container');
            if (!container) return;

            const monthKey = formatMonthLabel(selectedRecordsDate);
            const todayKey = formatYmd(new Date());
            const dateKeySet = new Set();

            records.forEach(record => {
                const d = record.createdAt?.toDate ? record.createdAt.toDate() : new Date(record.createdAt);
                if (!d || Number.isNaN(d.getTime())) return;
                const dateKey = formatYmd(d);
                if (dateKey.slice(0, 7) === monthKey && dateKey <= todayKey) dateKeySet.add(dateKey);
            });

            recordAttendance.forEach(record => {
                const dateKey = String(record.logicDate || '').trim() || formatYmd(getRecordDateValue(record.timestamp || record.createdAt));
                if (dateKey && dateKey.slice(0, 7) === monthKey && dateKey <= todayKey) dateKeySet.add(dateKey);
            });

            recordSchedules.forEach(record => {
                const dateKey = String(record.date || '').trim();
                if (dateKey && dateKey.slice(0, 7) === monthKey && dateKey <= todayKey) dateKeySet.add(dateKey);
            });

            const dateKeys = Array.from(dateKeySet).sort((a, b) => b.localeCompare(a));

            const rows = dateKeys
                .map(dateKey => ({
                    dateKey,
                    score: computeDailyScoreForDate(dateKey, records, recordAttendance, recordSchedules)
                }))
                .filter(row => row.score !== null);

            if (rows.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400"><i data-lucide="clipboard-list" size="48" class="mx-auto mb-2 opacity-20"></i><p>目前尚無評分紀錄</p></div>`;
                return;
            }

            container.innerHTML = `
                <div class="bg-white rounded-xl border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50">
                                <tr class="border-b border-gray-100">
                                    <th class="text-left px-4 py-3 font-bold text-gray-500">日期</th>
                                    <th class="text-right px-4 py-3 font-bold text-gray-500">每日評分</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows.map(row => `
                                    <tr class="border-b border-gray-100 last:border-b-0">
                                        <td class="px-4 py-3 text-gray-700 font-medium">${escapeHtml(row.dateKey)}</td>
                                        <td class="px-4 py-3 text-right font-black ${row.score >= 80 ? 'text-green-600' : (row.score >= 60 ? 'text-yellow-600' : 'text-red-600')}">${escapeHtml(String(row.score))}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

                // 將canvas轉換為圖片

                const canShare = 'share' in navigator && 'canShare' in navigator;
                
                // 創建分享按鈕的 HTML
                let shareButtonsHtml = '';
                
                if (canShare) {
                    shareButtonsHtml = `
                        <button onclick="shareViaWebShare('${imageData}')" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition flex items-center justify-center gap-2 mb-2">
                            <i data-lucide="share-2" size="18"></i>

        async function shareViaWebShare(imageData) {
            try {
                // 將 base64 圖片轉換為 Blob
                const response = await fetch(imageData);
                const blob = await response.blob();
                
                // 創建 File 對象
                const file = new File([blob], '獎懲公告.png', { type: 'image/png' });
                
                // 使用 Web Share API 分享
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        title: '獎懲公告',
                        text: '西北保全股份有限公司 獎懲公告',
                        files: [file]
                    });
                    closeShareModal();
                } else {
                    // 如果不支持分享文件，只分享文字
                    await navigator.share({
                        title: '獎懲公告',
                        text: '西北保全股份有限公司 獎懲公告'
                    });
                }
            } catch (error) {
                console.error('分享失敗:', error);
                if (error.name !== 'AbortError') {
                    alert('分享失敗，請嘗試下載圖片後手動分享');
                }
            }
        }

            const type = normalizeKey(document.getElementById('edit-type')?.value);

            const unit = normalizeKey(document.getElementById('edit-unit')?.value);
            const amount = Number(document.getElementById('edit-amount')?.value);

            if (!name || !category || !type || !statType || !unit || !amount) {
                alert('請填寫完整資訊');

            // 找到按鈕並顯示載入狀態

                                                        <button onclick="openEditSubTypeModal('${escapeHtml(type)}', '${escapeHtml(subType)}')" class="p-0.5 rounded-full hover:bg-blue-100 text-gray-400 hover:text-blue-600 transition">
                                                            <i data-lucide="pencil" size="12"></i>
                                                        </button>
                                                        <button onclick="confirmDeleteSubType('${escapeHtml(type)}', '${escapeHtml(subType)}')" class="p-0.5 rounded-full hover:bg-red-100 text-gray-400 hover:text-red-600 transition">
                                                            <i data-lucide="trash-2" size="12"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }).join('');

                const mySelectedDateKey = formatYmd(selectedMyQaiDate);
                const mySchedule = getScoredScheduleForDate(mySelectedDateKey, scheduleRecords);
                const getRecordDate = (raw) => {
                    if (!raw) return null;
                    if (raw.toDate) return raw.toDate();
                    if (raw.seconds) return new Date(raw.seconds * 1000);
                    return new Date(raw);
                };
                const myDayAttendanceRecords = attendanceRecords
                    .filter(r => {
                        const logicDate = String(r.logicDate || '').trim();
                        if (logicDate) return logicDate === mySelectedDateKey;
                        const d = getRecordDate(r.timestamp || r.createdAt);
                        return d && !Number.isNaN(d.getTime()) && formatYmd(d) === mySelectedDateKey;
                    })
                    .map(r => ({ ...r, _date: getRecordDate(r.timestamp || r.createdAt) }))
                    .filter(r => r._date && !Number.isNaN(r._date.getTime()))
                    .sort((a, b) => a._date - b._date);

                const inTypes = ['in', 'late_in', 'work_in', 'duty_in'];
                const outTypes = ['out', 'late_out', 'work_out', 'duty_out'];
                const firstIn = myDayAttendanceRecords.find(r => inTypes.includes(String(r.type || '').trim()));
                let lastOut = null;
                for (let i = myDayAttendanceRecords.length - 1; i >= 0; i--) {
                    const t = String(myDayAttendanceRecords[i].type || '').trim();
                    if (outTypes.includes(t)) {
                        lastOut = myDayAttendanceRecords[i];
                        break;
                    }
                }

                const attendanceConfiguredValues = {
                    '上班打卡': Number(statSubTypeValues['出勤']?.['上班打卡'] || 0),
                    '下班打卡': Number(statSubTypeValues['出勤']?.['下班打卡'] || 0),
                    '無遲到': Number(statSubTypeValues['出勤']?.['無遲到'] || 0),
                    '無早退': Number(statSubTypeValues['出勤']?.['無早退'] || 0)
                };
                const attendanceSubTypeScores = {
                    '上班打卡': firstIn ? attendanceConfiguredValues['上班打卡'] : 0,
                    '下班打卡': lastOut ? attendanceConfiguredValues['下班打卡'] : 0,
                    '無遲到': 0,
                    '無早退': 0
                };

                if (mySchedule?.startTime && mySchedule?.endTime) {
                    const [sh, sm] = String(mySchedule.startTime).split(':').map(Number);
                    const [eh, em] = String(mySchedule.endTime).split(':').map(Number);
                    const baseDate = parseYmdToDate(mySelectedDateKey);
                    const start = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(), sh || 0, sm || 0, 0, 0);
                    const end = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(), eh || 0, em || 0, 0, 0);
                    const crossDay = mySchedule.crossDay === true || ((eh || 0) * 60 + (em || 0)) < ((sh || 0) * 60 + (sm || 0));
                    if (crossDay) end.setDate(end.getDate() + 1);

                    const today = new Date();
                    attendanceSubTypeScores['無遲到'] = firstIn ? (firstIn._date <= start ? attendanceConfiguredValues['無遲到'] : 0) : (today < start ? attendanceConfiguredValues['無遲到'] : 0);
                    attendanceSubTypeScores['無早退'] = lastOut ? (lastOut._date >= end ? attendanceConfiguredValues['無早退'] : 0) : (today < end ? attendanceConfiguredValues['無早退'] : 0);
                }

                const attendanceTypeScore = Object.values(attendanceSubTypeScores).reduce((sum, val) => sum + Number(val || 0), 0);
                const myTypeDeltaPoints = {};
                const mySubTypeDeltaPoints = {};
                const myDayRecords = allRecords.filter(r => {
                    if (!myNameKey) return false;
                    if (normalizeKey(r.name || '') !== myNameKey) return false;
                    const raw = r.createdAt;
                    if (!raw) return false;
                    const d = raw.toDate ? raw.toDate() : new Date(raw);
                    if (!d || Number.isNaN(d.getTime())) return false;
                    return formatYmd(d) === mySelectedDateKey;
                });

                myDayRecords.forEach(r => {
                    const unit = normalizeKey(r.unit || '');
                    if (unit !== 'points') return;
                    const amount = Number(r.amount || 0);
                    if (!Number.isFinite(amount) || amount === 0) return;
                    const category = normalizeKey(r.category || 'penalty');
                    const sign = category === 'reward' ? 1 : -1;
                    const type = normalizeKey(r.statType || r.type || '');
                    if (!type) return;
                    myTypeDeltaPoints[type] = (myTypeDeltaPoints[type] || 0) + (sign * amount);
                    const subType = normalizeKey(r.statSubType || '');
                    if (subType) {
                        if (!mySubTypeDeltaPoints[type]) mySubTypeDeltaPoints[type] = {};
                        mySubTypeDeltaPoints[type][subType] = (mySubTypeDeltaPoints[type][subType] || 0) + (sign * amount);
                    }
                });

                const myBaseTotal = statTypes.reduce((sum, t) => {
                    const v = statTypeValues[t] !== undefined ? Number(statTypeValues[t] || 0) : Math.round(100 / statTypes.length);
                    return sum + (Number.isFinite(v) ? v : 0);
                }, 0);
                const myDeltaTotal = Object.entries(myTypeDeltaPoints).reduce((sum, [typeName, value]) => {
                    if (typeName === '出勤') return sum;
                    return sum + (Number(value) || 0);
                }, 0);
                const baseAttendanceTypeValue = statTypeValues['出勤'] !== undefined ? Number(statTypeValues['出勤'] || 0) : 0;
                const myDailyScore = mySchedule ? ((myBaseTotal - baseAttendanceTypeValue) + attendanceTypeScore + myDeltaTotal) : null;

                const myHtml = statTypes.map(type => {
                        const isAttendanceType = type === '出勤';
                        const configuredSubTypes = isAttendanceType
                            ? ['上班打卡', '下班打卡', '無遲到', '無早退']
                            : (Array.isArray(statSubTypes[type]) ? statSubTypes[type] : []);
                        const recordedSubTypes = isAttendanceType ? [] : Object.keys(mySubTypeDeltaPoints[type] || {});
                        const subTypes = Array.from(new Set([...configuredSubTypes, ...recordedSubTypes]));

                        const baseTypeValue = statTypeValues[type] !== undefined ? Number(statTypeValues[type] || 0) : Math.round(100 / statTypes.length);
                        const typeValue = isAttendanceType ? attendanceTypeScore : (baseTypeValue + (myTypeDeltaPoints[type] || 0));

                        return `
                            <div class="border-b border-gray-100 last:border-b-0">
                                <div class="flex items-center justify-between py-2">
                                    <div class="flex items-center gap-2">
                                        <span class="text-gray-700 text-sm font-medium">${escapeHtml(type)}</span>
                                        <span class="text-green-600 text-sm font-bold">${typeValue}</span>
                                    </div>
                                    <div class="flex items-center gap-1"></div>
                                </div>
                                ${Array.isArray(subTypes) && subTypes.length > 0 ? `
                                    <div class="pl-4 pb-2 space-y-1">
                                        ${subTypes.map(subType => {
                                            const subValue = isAttendanceType
                                                ? Number(attendanceSubTypeScores[subType] || 0)
                                                : ((statSubTypeValues[type]?.[subType] !== undefined ? Number(statSubTypeValues[type]?.[subType] || 0) : 0) + (mySubTypeDeltaPoints[type]?.[subType] || 0));
                                            return `
                                                <div class="flex items-center justify-between py-1">
                                                    <div class="flex items-center gap-2">
                                                        <span class="text-gray-500 text-xs">${escapeHtml(subType)}</span>
                                                        <span class="text-green-500 text-xs font-bold">${subValue}</span>
                                                    </div>
                                                    <div class="flex items-center gap-1"></div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }).join('');

                if (typeStatsEl) typeStatsEl.innerHTML = html;
                if (myTypeStatsEl) {
                    myTypeStatsEl.innerHTML = mySchedule
                        ? myHtml
                        : '<div class="text-center py-6 text-sm text-gray-400">此日期非上班日或值班日，不顯示評分</div>';
                }

                const score = computeQaiScoreFromCurrentStats();
                if (statsScoreEl) {
                    statsScoreEl.textContent = String(score);
                    setQaiScoreColor(statsScoreEl, score);
                }
                if (myScoreEl) {
                    if (myDailyScore === null) {
                        myScoreEl.textContent = '--';
                        myScoreEl.classList.remove('text-green-600', 'text-yellow-600', 'text-red-600');
                        myScoreEl.classList.add('text-gray-400');
                    } else {
                        myScoreEl.classList.remove('text-gray-400');
                        myScoreEl.textContent = String(myDailyScore);
                        setQaiScoreColor(myScoreEl, myDailyScore);
                    }
                }

                const prefix = selectedUserName ? selectedUserName + ' -' : '';
                if (selectedUserNameEl) selectedUserNameEl.textContent = prefix;

                lucide.createIcons();
            } catch (e) {
                console.error(e);
                if (typeStatsEl) typeStatsEl.innerHTML = '<p class="text-gray-400 text-sm">無法載入統計</p>';
                if (myTypeStatsEl) myTypeStatsEl.innerHTML = '<p class="text-gray-400 text-sm">無法載入統計</p>';
            }
        }
