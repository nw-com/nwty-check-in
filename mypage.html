        async function saveEditType() {
            const nameInput = document.getElementById('edit-type-name');
            const valueInput = document.getElementById('edit-type-value');
            const newTypeName = normalizeKey(nameInput?.value);
            const newValue = valueInput?.value !== '' ? parseInt(valueInput?.value) : undefined;
            
            if (!newTypeName) {
                alert('請輸入類型名稱');
                return;
            }
            
            if (!settingsDocRef) {
                alert('無法保存，請重新選擇社區');
                return;
            }
            
            if (newTypeName !== currentEditType && statTypes.includes(newTypeName)) {
                alert('此類型已存在');
                return;
            }
            
            try {
                const newTypes = statTypes.map(t => t === currentEditType ? newTypeName : t);
                const newSubTypes = { ...statSubTypes };
                if (newSubTypes.hasOwnProperty(currentEditType)) {
                    newSubTypes[newTypeName] = newSubTypes[currentEditType];
                    delete newSubTypes[currentEditType];
                }
                
                // 处理类型数值
                const newTypeValues = { ...statTypeValues };
                if (newTypeName !== currentEditType) {
                    if (newTypeValues.hasOwnProperty(currentEditType)) {
                        newTypeValues[newTypeName] = newTypeValues[currentEditType];
                        delete newTypeValues[currentEditType];
                    }
                }
                if (newValue !== undefined) {
                    newTypeValues[newTypeName] = newValue;
                }
                
                // 处理子类型数值
                let newSubTypeValues = { ...statSubTypeValues };
                if (newTypeName !== currentEditType) {
                    if (newSubTypeValues.hasOwnProperty(currentEditType)) {
                        newSubTypeValues[newTypeName] = newSubTypeValues[currentEditType];
                        delete newSubTypeValues[currentEditType];
                    }
                }
                
                // 计算当前总数值并调整
                let totalValue = 0;
                const typesWithValues = [];
                
                for (const type of newTypes) {
                    let typeVal;
                    if (newTypeValues[type] !== undefined) {
                        typeVal = newTypeValues[type];
                    } else {
                        typeVal = Math.round(100 / newTypes.length);
                    }
                    typesWithValues.push({ type, val: typeVal });
                    totalValue += typeVal;
                }
                
                // 如果总数值不等于100，调整最后一个类型的数值
                if (totalValue !== 100 && typesWithValues.length > 0) {
                    const lastType = typesWithValues[typesWithValues.length - 1].type;
                    let adjustment = 100 - totalValue;
                    let newLastVal = typesWithValues[typesWithValues.length - 1].val + adjustment;
                    
                    // 确保调整后的数值不为负数
                    if (newLastVal < 0) {
                        adjustment = -typesWithValues[typesWithValues.length - 1].val;
                        newLastVal = 0;
                    }
                    
                    newTypeValues[lastType] = newLastVal;
                }
                
                // 调整当前编辑类型的子类型数值，确保总和等于父类型数值
                newSubTypeValues = adjustSubtypeValues(
                    newTypeName, 
                    newSubTypeValues, 
                    newTypeValues[newTypeName],
                    newSubTypes[newTypeName]
                );
                
                // 更新当前用户数据
                if (selectedUserName) {
                    userStatsData[selectedUserName] = {
                        types: newTypes,
                        subTypes: newSubTypes,
                        typeValues: newTypeValues,
                        subTypeValues: newSubTypeValues
                    };
                }
                
                await settingsDocRef.set({ 
                    userStatsData: userStatsData
                }, { merge: true });
                
                // 更新已有记录
                if (newTypeName !== currentEditType) {
                    const snapshot = await settingsDocRef.collection('penalties')
                        .where('statType', '==', currentEditType)
                        .get();
                    
                    for (const doc of snapshot.docs) {
                        await doc.ref.update({ statType: newTypeName });
                    }
                }
                
                closeEditTypeModal();
            } catch (e) {
                console.error(e);
                alert('保存失敗，請稍後再試');
            }
        }

        async function deleteSubType(parentType, subTypeName) {
            if (!settingsDocRef) {
                alert('無法刪除，請重新選擇社區');
                return;
            }
            
            try {
                const newSubTypes = { ...statSubTypes };
                const currentSubTypes = newSubTypes[parentType] || [];
                newSubTypes[parentType] = currentSubTypes.filter(t => t !== subTypeName);
                
                if (newSubTypes[parentType].length === 0) {
                    delete newSubTypes[parentType];
                }
                
                // 处理子类型数值的删除
                let newSubTypeValues = { ...statSubTypeValues };
                if (newSubTypeValues[parentType]) {
                    delete newSubTypeValues[parentType][subTypeName];
                    // 如果该类型下没有子类型数值了，删除该类型的子类型数值对象
                    if (Object.keys(newSubTypeValues[parentType]).length === 0) {
                        delete newSubTypeValues[parentType];
                    }
                }
                
                // 调整剩余子类型数值，确保总和等于父类型数值
                if (newSubTypes[parentType] && newSubTypes[parentType].length > 0) {
                    newSubTypeValues = adjustSubtypeValues(
                        parentType, 
                        newSubTypeValues,
                        undefined,
                        newSubTypes[parentType]
                    );
                }
                
                // 更新当前用户数据
                if (selectedUserName) {
                    userStatsData[selectedUserName] = {
                        types: [...statTypes],
                        subTypes: newSubTypes,
                        typeValues: { ...statTypeValues },
                        subTypeValues: newSubTypeValues
                    };
                }
                
                // 完整更新整个对象
                await settingsDocRef.update({
                    userStatsData: userStatsData
                });
            } catch (e) {
                console.error(e);
                alert('刪除失敗，請稍後再試');
            }
        }

        function openAddTypeModal() {
            const modal = document.getElementById('add-type-modal');
            if (modal) {
                modal.classList.remove('hidden');
                const input = document.getElementById('new-type-name');
                if (input) {
                    input.value = '';
                    input.focus();
                }
            }
        }

        function closeAddTypeModal() {
            const modal = document.getElementById('add-type-modal');
            if (modal) {
                modal.classList.add('hidden');
            }
        }

        async function saveNewType() {
            const input = document.getElementById('new-type-name');
            const newTypeName = normalizeKey(input?.value);
            
            if (!newTypeName) {
                alert('請輸入類型名稱');
                return;
            }
            
            if (!settingsDocRef) {
                alert('無法保存，請重新選擇社區');
                return;
            }
            
            if (statTypes.includes(newTypeName)) {
                alert('該類型已存在');
                return;
            }
            
            try {
                const newTypes = [...statTypes, newTypeName];
                const newTypeValues = { ...statTypeValues };
                
                // 计算新类型的初始值，从现有类型中平均分享
                const numTypes = newTypes.length;
                const baseVal = Math.floor(100 / numTypes);
                const remainder = 100 - (baseVal * numTypes);
                
                // 为所有类型设置基础值
                for (let i = 0; i < newTypes.length; i++) {
                    newTypeValues[newTypes[i]] = baseVal + (i < remainder ? 1 : 0);
                }
                
                // 更新当前用户数据
                if (selectedUserName) {
                    userStatsData[selectedUserName] = {
                        types: newTypes,
                        subTypes: { ...statSubTypes },
                        typeValues: newTypeValues,
                        subTypeValues: { ...statSubTypeValues }
                    };
                }
                
                await settingsDocRef.set({ 
                    userStatsData: userStatsData
                }, { merge: true });
                closeAddTypeModal();
                updateStatTypeOptions();
            } catch (e) {
                console.error(e);
                alert('保存失敗，請稍後再試');
            }
        }

        function updateStatTypeOptions() {
            const statTypeSelect = document.getElementById('penalty-stat-type');
            const editStatTypeSelect = document.getElementById('edit-stat-type');
            
            const options = '<option value="">請選擇統計類型</option>' + 
                statTypes.map(t => `<option value="${t}">${t}</option>`).join('');
            
            if (statTypeSelect) {
                statTypeSelect.innerHTML = options;
            }
            
            if (editStatTypeSelect) {
                editStatTypeSelect.innerHTML = options;
            }
        }

        function updateStatSubTypeOptions() {
            const statTypeSelect = document.getElementById('penalty-stat-type');
            const statSubTypeSelect = document.getElementById('penalty-stat-subtype');
            
            if (!statTypeSelect || !statSubTypeSelect) return;
            
            const selectedType = statTypeSelect.value;
            const subTypes = statSubTypes[selectedType] || [];
            
            const options = '<option value="">請選擇統計子類型（可選）</option>' + 
                subTypes.map(t => `<option value="${t}">${t}</option>`).join('');

        }

        function updateEditStatSubTypeOptions() {
            const statTypeSelect = document.getElementById('edit-stat-type');
            const statSubTypeSelect = document.getElementById('edit-stat-subtype');
            
            if (!statTypeSelect || !statSubTypeSelect) return;
            
            const selectedType = statTypeSelect.value;
            const subTypes = statSubTypes[selectedType] || [];
            
            const options = '<option value="">請選擇統計子類型（可選）</option>' + 
                subTypes.map(t => `<option value="${t}">${t}</option>`).join('');

        async function confirmModalOk() {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (pendingConfirmAction) {
                await pendingConfirmAction();
            }
            pendingConfirmAction = null;
        }

        function openShareModal() {
            document.getElementById('share-modal').classList.remove('hidden');
        }

            document.getElementById('share-modal').classList.add('hidden');
        }

        function hideAppChrome() {
            const header = document.getElementById('page-header');
            const nav = document.getElementById('page-nav');
            if (header) header.classList.add('hidden');
            if (nav) nav.classList.add('hidden');
        }

        function showAppChrome() {
            const header = document.getElementById('page-header');
            const nav = document.getElementById('page-nav');
            if (header) header.classList.remove('hidden');
            if (nav) nav.classList.toggle('hidden', !!isPublicView);

        function renderAuthScreen(msg) {
            hideAppChrome();
            const main = document.getElementById('app-main');
            if (!main) return;
            main.innerHTML = `
                <div class="mt-10 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <div class="text-lg font-black text-gray-800 mb-2">需要登入</div>
                    <div class="text-sm text-gray-500 mb-5">${msg || '請先登入後才能檢視罰扣頁面。'}</div>
                    <a href="./" class="inline-flex items-center justify-center w-full bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl py-3 transition-colors">前往登入</a>
                </div>
            `;
        }

        function renderErrorScreen(msg) {
            hideAppChrome();
            const main = document.getElementById('app-main');
            if (!main) return;
            main.innerHTML = `
                <div class="mt-10 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <div class="text-lg font-black text-gray-800 mb-2">無法載入</div>
                    <div class="text-sm text-gray-500 mb-5">${msg || '發生錯誤'}</div>
                    <a href="./" class="inline-flex items-center justify-center w-full bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl py-3 transition-colors">返回</a>

        function initFirebaseCompat() {
            if (!window.FIREBASE_CONFIG) throw new Error('缺少 firebase-config.js');
            if (!window.firebase) throw new Error('Firebase SDK 載入失敗');
            if (!firebase.apps || firebase.apps.length === 0) {
                firebase.initializeApp(window.FIREBASE_CONFIG);
            }
            return {
                auth: firebase.auth(),
                db: firebase.firestore()
            };
        }

        async function loadDbUserByEmail(db, email) {
            const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users')
                .where('email', '==', String(email || '').trim())
                .limit(1)
                .get();
            if (snap.empty) return null;
            const doc = snap.docs[0];
            return { id: doc.id, ...doc.data() };
        }

        async function resolveRoleName(db, user) {
            const roleId = String(user?.role || '').trim();
            if (!roleId) return '';
            if (roleId === 'admin') return '系統管理員';
            if (roleId === 'manager') return '管理層';
            if (roleId === 'hr') return '人事';
            if (roleId === 'property') return '物業';
            if (roleId === 'cadre') return '幹部';
            try {
                const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('roles').doc(roleId).get();
                return snap.exists ? String((snap.data() || {}).name || '').trim() : '';
            } catch {
                return '';
            }
        }

        function computeCanManage(roleId, roleName) {
            const key = String(roleId || '').trim().toLowerCase();
            const name = String(roleName || '').trim();
            // 只有系統管理員才有權限顯示設定
            if (key === 'admin') return true;
            if (name.includes('系統管理員')) return true;
            return false;
        }

        function updateNavVisibility() {
            const navStats = document.getElementById('nav-stats');
            const navData = document.getElementById('nav-data');
            if (navStats) {
                if (canManageSettings) {
                    navStats.classList.remove('hidden');
                } else {
                    navStats.classList.add('hidden');
                    // 如果當前在設定頁面，自動切換到資訊頁面
                    const viewStats = document.getElementById('view-stats');
                    if (viewStats && !viewStats.classList.contains('hidden')) {
                        switchView('add');
                    }
                }
            }
            if (navData) {
                if (canManageSettings) {
                    navData.classList.remove('hidden');
                } else {
                    navData.classList.add('hidden');
                    // 如果當前在資料頁面，自動切換到資訊頁面
                    const viewData = document.getElementById('view-data');
                    if (viewData && !viewData.classList.contains('hidden')) {
                        switchView('add');
                    }
                }
            }
        }

        function resolveAllowedCommunityIds(u) {
            if (!u) return [];
            if (String(u.role || '') === 'admin') return ['*'];
            const ids = Array.isArray(u.communityIds) ? u.communityIds : [];
            if (u.communityId) ids.push(u.communityId);
            return Array.from(new Set(ids.map(x => String(x).trim().toUpperCase()).filter(Boolean)));
        }

        function getRequestedCommunityId() {
            const params = new URLSearchParams(window.location.search || '');
            return String(params.get('communityId') || '').trim().toUpperCase();
        }

        function getIsPublicMode() {
            const params = new URLSearchParams(window.location.search || '');
            return String(params.get('public') || '') === '1';
        }

        function setPageTitle() {
            const el = document.getElementById('page-title');
            const userName = dbUser?.name || fbUser?.displayName || '使用者';
            if (el) el.textContent = `QAi個人資訊 ${userName}`;
            document.title = `QAi個人資訊 ${userName}`;
        }

        function loadRoles() {
            if (rolesUnsub) { try { rolesUnsub(); } catch {} rolesUnsub = null; }
            
            const rolesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('roles');
            
            rolesUnsub = rolesRef.onSnapshot(snapshot => {
                const loadedRoles = [];
                snapshot.forEach(doc => {
                    loadedRoles.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                roles = loadedRoles;
                if (selectedCommunityId) {
                    updateUserSelectOptions();
                }
                // 检查是否在统计视图
                if (!document.getElementById('view-stats')?.classList.contains('hidden')) {
                    updateFilterOptions(true);
                    renderUserList();
                }
            }, error => {
                console.error('Error loading roles:', error);
                roles = [];
                if (!document.getElementById('view-stats')?.classList.contains('hidden')) {
                    updateFilterOptions(true);
                    renderUserList();
                }
            });
        }

        function loadCommunityUsers(commId) {
            if (usersUnsub) { try { usersUnsub(); } catch {} usersUnsub = null; }
            
            const usersRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users');
            
            usersUnsub = usersRef.onSnapshot(snapshot => {
                const users = [];
                snapshot.forEach(doc => {
                    const userData = doc.data();
                    const userCommunityIds = Array.isArray(userData.communityIds) 
                        ? userData.communityIds 
                        : (userData.communityId ? [userData.communityId] : []);
                    
                    const hasAccessToCommunity = userCommunityIds.includes(commId) || 
                        userCommunityIds.some(id => String(id).trim().toUpperCase() === String(commId).trim().toUpperCase());
                    
                    // 如果是系统管理员或者有访问权限，并且状态是在職
                    if ((hasAccessToCommunity || String(userData.role || '').trim() === 'admin') && userData.status === '在職') {
                        users.push({
                            id: doc.id,
                            name: userData.name || userData.email || '',
                            role: userData.role || '',
                            ...userData
                        });
                    }
                });
                
                communityUsers = users;
                updateUserSelectOptions();
                renderMyProfile();
                // 检查是否在统计视图
                if (!document.getElementById('view-stats')?.classList.contains('hidden')) {
                    updateFilterOptions(true);
                    renderUserList();
                }
            }, error => {
                console.error('Error loading users:', error);
                communityUsers = [];
                updateUserSelectOptions();
                renderMyProfile();
                if (!document.getElementById('view-stats')?.classList.contains('hidden')) {
                    updateFilterOptions(true);
                    renderUserList();
                }
            });
        }

        function loadAllUsers() {
            if (usersUnsub) { try { usersUnsub(); } catch {} usersUnsub = null; }
            
            const usersRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users');
            
            usersUnsub = usersRef.onSnapshot(snapshot => {
                const users = [];
                snapshot.forEach(doc => {
                    const userData = doc.data();
                    if (userData.status === '在職') {
                        users.push({
                            id: doc.id,
                            name: userData.name || userData.email || '',
                            role: userData.role || '',
                            ...userData
                        });
                    }
                });
                
                communityUsers = users;
                updateUserSelectOptions();
                // 检查是否在统计视图
                if (!document.getElementById('view-stats')?.classList.contains('hidden')) {
                    updateFilterOptions(true);
                    renderUserList();
                }
            }, error => {
                console.error('Error loading users:', error);
                communityUsers = [];
                updateUserSelectOptions();
                if (!document.getElementById('view-stats')?.classList.contains('hidden')) {
                    updateFilterOptions(true);
                    renderUserList();
                }
            });
        }

        function updateUserSelectOptions() {
            const penaltyNameSelect = document.getElementById('penalty-name');
            const editNameSelect = document.getElementById('edit-name');
            
            if (!penaltyNameSelect && !editNameSelect) return;
            
            const targetRoleNames = ['總幹事', '秘書', '清潔', '機電', '保全'];
            
            const filteredUsers = communityUsers.filter(user => {
                const userRoleId = user.role || '';
                const roleObj = roles.find(r => r.id === userRoleId);
                const roleName = roleObj ? roleObj.name : '';
                return targetRoleNames.includes(roleName);
            });
            
            const optionsHtml = '<option value="">請選擇人員</option>' + 
                filteredUsers.map(user => {
                    const displayName = user.name || user.email || '';
                    return `<option value="${escapeHtml(displayName)}">${escapeHtml(displayName)}</option>`;
                }).join('');
            
            if (penaltyNameSelect) {
                penaltyNameSelect.innerHTML = optionsHtml;
            }
            
            if (editNameSelect) {
                const currentValue = editNameSelect.value;
                editNameSelect.innerHTML = optionsHtml;
                editNameSelect.value = currentValue;
            }
        }
        


        function selectCommunity(commId, commName) {
            selectedCommunityId = commId;
            selectedCommunityName = commName;
            selectedRecordsDate = new Date(); // 重置為當日日期
            setPageTitle();
            
            if (settingsUnsub) { try { settingsUnsub(); } catch {} settingsUnsub = null; }
            settingsDocRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('community_penalties').doc(commId);
            
            // 訂閱設置文檔
            settingsUnsub = settingsDocRef.onSnapshot((doc) => {
                const data = doc.data();
                currentSettings = data;
                
                // 加载用户统计数据
                if (data && typeof data.userStatsData === 'object' && data.userStatsData !== null) {
                    userStatsData = data.userStatsData;
                } else {
                    userStatsData = {};
                }
                
                // 如果有选中的用户，加载该用户的数据；否则初始化默认数据
                if (selectedUserName && userStatsData[selectedUserName]) {
                    const userData = userStatsData[selectedUserName];
                    statTypes = [...userData.types];
                    statSubTypes = { ...userData.subTypes };
                    statTypeValues = { ...userData.typeValues };
                    statSubTypeValues = { ...userData.subTypeValues };
                } else {
                    // 没有选中用户或没有该用户数据，使用默认值
                    initDefaultStats();
                }
                
                updateStatTypeOptions();
                renderMyProfile();
                renderStats();
            }, () => {
                userStatsData = {};
                initDefaultStats();
                updateStatTypeOptions();
                renderMyProfile();
                renderStats();
            });
            
            loadRoles();
            loadCommunityUsers(commId);
            updateRecordsDateLabel();
            updateDateNavButtons();
            subscribeRecordsForDate(selectedRecordsDate);
        }

        function renderCommunitySelector(communities, allowedIds) {
            const main = document.getElementById('app-main');
            if (!main) return;

            const canAccessAny = allowedIds.includes('*') || allowedIds.length > 0;
            if (!canAccessAny) {
                main.innerHTML = `
                    <div class="mt-10 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                        <div class="text-lg font-black text-gray-800 mb-2">無訪問權限</div>
                        <div class="text-sm text-gray-500 mb-5">您的帳號尚未被分配任何社區。</div>
                        <a href="./" class="inline-flex items-center justify-center w-full bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl py-3 transition-colors">返回</a>
                    </div>
                `;
                return;
            }

            const allowedCommunities = communities.filter(c => allowedIds.includes('*') || allowedIds.includes(String(c.id).trim().toUpperCase()));

            main.innerHTML = `
                <div class="space-y-3">
                    <h2 class="font-bold text-gray-800 text-lg">選擇社區</h2>
                    ${allowedCommunities.map(c => `
                        <button onclick='selectCommunity("${String(c.id)}", "${escapeHtml(String(c.name || c.id))}")' class="w-full bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:border-red-300 hover:bg-red-50 transition flex items-center justify-between group">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center text-red-600">
                                    <i data-lucide="building-2" size="20"></i>
                                </div>
                                <div class="text-left">
                                    <div class="font-bold text-gray-800">${escapeHtml(String(c.name || c.id))}</div>
                                    <div class="text-xs text-gray-500">ID: ${escapeHtml(String(c.id))}</div>
                                </div>
                            </div>
                            <i data-lucide="chevron-right" size="20" class="text-gray-400 group-hover:text-red-500 transition"></i>
                        </button>
                    `).join('')}
                </div>
            `;

            lucide.createIcons();
        }

        async function init() {
            try {
                isPublicView = getIsPublicMode();
                
                const { auth, db: firestore } = initFirebaseCompat();
                db = firestore;
                
                auth.onAuthStateChanged(async user => {
                    fbUser = user;
                    
                    if (!user && !isPublicView) {
                        renderAuthScreen();
                        return;
                    }

                    if (user) {
                        dbUser = await loadDbUserByEmail(db, user.email);
                        const roleName = await resolveRoleName(db, dbUser);
                        canManageSettings = computeCanManage(dbUser?.role, roleName);
                        updateNavVisibility();
                        setPageTitle(); // 更新頁面標題顯示用戶姓名
                        renderMyProfile();
                    }

                    showAppChrome();

                    const communitiesSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('communities').get();
                    const communities = [];
                    communitiesSnap.forEach(doc => communities.push({ id: doc.id, ...doc.data() }));
                    
                    // 保存所有社区到变量
                    allCommunities = communities;

                    if (communities.length === 0) {
                        renderErrorScreen('尚未設定任何社區，請先至總覽頁建立社區。');
                        return;
                    }

                    const allowedIds = dbUser ? resolveAllowedCommunityIds(dbUser) : ['*'];
                    const requestedCommunityId = getRequestedCommunityId();

                    if (requestedCommunityId) {
                        const target = communities.find(c => String(c.id).trim().toUpperCase() === requestedCommunityId);
                        if (target) {
                            selectCommunity(String(target.id), String(target.name || target.id));
                            return;
                        }
                    }

                    // 直接選擇第一個有權限訪問的社區
                    const allowedCommunities = communities.filter(c => allowedIds.includes('*') || allowedIds.includes(String(c.id).trim().toUpperCase()));
                    if (allowedCommunities.length > 0) {
                        selectCommunity(String(allowedCommunities[0].id), String(allowedCommunities[0].name || allowedCommunities[0].id));
                        return;
                    }

                    // 如果沒有權限訪問任何社區，顯示錯誤
                    renderErrorScreen('您沒有權限訪問任何社區。');
                });
            } catch (e) {
                console.error(e);
                renderErrorScreen('初始化失敗，請重新整理頁面。');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
