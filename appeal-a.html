<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>總經理看板 - 總經理直通車</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="./firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <style>
    body { background-color: #f1f5f9; }
    /* 卡片進場動畫 */
    .card-enter { animation: slideUp 0.4s ease-out forwards; opacity: 0; transform: translateY(20px); }
    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="text-slate-800 antialiased pb-10">

  <!-- 頂部導覽列 -->
  <header class="sticky top-0 left-0 right-0 bg-slate-900 text-white shadow-lg z-40">
    <div class="flex items-center justify-between h-16 px-4 max-w-lg mx-auto">
      <div class="flex items-center">
        <i data-lucide="shield-alert" class="w-7 h-7 mr-2 text-red-400"></i>
        <h1 class="text-xl font-bold tracking-wide">總經理看板</h1>
      </div>
      <div class="flex items-center gap-3">
        <button type="button" onclick="openAppealShareModal()" class="w-10 h-10 rounded-xl bg-slate-800/60 text-slate-200 hover:bg-slate-700 flex items-center justify-center">
          <i data-lucide="share-2" class="w-5 h-5"></i>
        </button>
        <div class="relative">
          <i data-lucide="bell" class="w-6 h-6 text-slate-300"></i>
          <span class="absolute top-0 right-0 -mt-1 -mr-1 flex h-3 w-3">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
          </span>
        </div>
      </div>
    </div>
  </header>

  <main class="px-4 pt-6 max-w-lg mx-auto space-y-6">
    
    <!-- 統計數據卡片 -->
    <section class="grid grid-cols-3 gap-3">
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 flex flex-col justify-center items-center">
        <div class="flex items-center text-red-500 mb-1">
          <i data-lucide="alert-triangle" class="w-5 h-5 mr-1"></i>
          <span class="font-bold text-sm">待處理高</span>
        </div>
        <span class="text-3xl font-black text-slate-800" id="pendingHighCount">0</span>
      </div>
      
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 flex flex-col justify-center items-center">
        <div class="flex items-center text-yellow-500 mb-1">
          <i data-lucide="clock-3" class="w-5 h-5 mr-1"></i>
          <span class="font-bold text-sm">待處理中</span>
        </div>
        <span class="text-3xl font-black text-slate-800" id="pendingMediumCount">0</span>
      </div>

      <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 flex flex-col justify-center items-center">
        <div class="flex items-center text-green-500 mb-1">
          <i data-lucide="badge-check" class="w-5 h-5 mr-1"></i>
          <span class="font-bold text-sm">待處理低</span>
        </div>
        <span class="text-3xl font-black text-slate-800" id="pendingLowCount">0</span>
      </div>
    </section>

    <!-- 案件列表區 -->
    <section>
      <div class="flex items-center justify-between mb-4 px-1">
        <h2 class="text-lg font-bold text-slate-800">案件列表</h2>
        <button id="filterButton" type="button" onclick="openFilterModal()" class="text-sm text-red-600 font-semibold flex items-center">
          <i data-lucide="filter" class="w-4 h-4 mr-1"></i> <span id="filterButtonLabel">篩選</span>
        </button>
      </div>

      <div class="space-y-6">
        <div>
          <div class="flex items-center gap-2 mb-3 px-1">
            <i data-lucide="list-todo" class="w-4 h-4 text-red-500"></i>
            <h3 class="text-base font-black text-slate-800">未處理案件</h3>
          </div>
          <div id="pendingReportList" class="space-y-4">
            <!-- 未處理卡片將由 JavaScript 動態生成 -->
          </div>
        </div>
        <div>
          <div class="flex items-center gap-2 mb-3 px-1">
            <i data-lucide="archive" class="w-4 h-4 text-green-600"></i>
            <h3 class="text-base font-black text-slate-800">已處理案件</h3>
          </div>
          <div id="resolvedReportList" class="space-y-4">
            <!-- 已處理卡片將由 JavaScript 動態生成 -->
          </div>
        </div>
      </div>
    </section>

  </main>

  <div id="appealShareModal" class="fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm hidden items-end sm:items-center justify-center p-4" onclick="closeAppealShareModal()">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
      <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
        <div>
          <div class="text-lg font-black text-slate-800">分享申訴管道</div>
          <div class="text-xs text-slate-400 mt-1">直通總經理的申訴管道</div>
        </div>
        <button type="button" onclick="closeAppealShareModal()" class="w-9 h-9 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200 flex items-center justify-center">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <div class="flex justify-center">
          <div id="appealShareQr" class="bg-white p-3 rounded-2xl border border-slate-200"></div>
        </div>
        <div id="appealShareUrl" class="text-[11px] text-slate-500 break-all bg-slate-50 border border-slate-100 rounded-xl p-3"></div>
        <button type="button" onclick="shareAppealToLine()" class="w-full py-3 rounded-2xl bg-[#06C755] hover:bg-[#05b64d] text-white font-black transition-colors flex items-center justify-center gap-2">
          <span class="w-5 h-5 rounded bg-white/20 flex items-center justify-center">
            <i data-lucide="message-circle" class="w-4 h-4"></i>
          </span>
          分享到 Line
        </button>
      </div>
    </div>
  </div>

  <div id="handlingModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden items-end sm:items-center justify-center p-4" onclick="closeHandlingModal()">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
      <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
        <div>
          <div class="text-lg font-black text-slate-800">案件處理</div>
          <div id="handlingModalSubtitle" class="text-xs text-slate-400 mt-1">填寫處理方式後可直接分享到 Line</div>
        </div>
        <button type="button" onclick="closeHandlingModal()" class="w-9 h-9 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200 flex items-center justify-center">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
          <div id="handlingModalTitle" class="font-bold text-slate-800"></div>
          <div id="handlingModalMeta" class="text-xs text-slate-500 mt-1"></div>
        </div>
        <div>
          <label for="handlingMethodInput" class="block text-sm font-bold text-slate-700 mb-2">回覆內容</label>
          <textarea id="handlingMethodInput" rows="5" placeholder="請輸入處理方式、支援需求或回覆內容..." class="w-full px-4 py-3 bg-white border border-slate-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none text-base shadow-sm"></textarea>
        </div>
        <div class="flex gap-3">
          <button type="button" onclick="closeHandlingModal()" class="flex-1 py-3 rounded-2xl bg-slate-100 text-slate-700 font-bold hover:bg-slate-200 transition-colors">關閉</button>
          <button type="button" onclick="saveHandlingMethod()" class="flex-1 py-3 rounded-2xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-colors">儲存</button>
        </div>
        <button type="button" onclick="shareHandlingToLine()" class="w-full py-3 rounded-2xl bg-[#06C755] hover:bg-[#05b64d] text-white font-black transition-colors flex items-center justify-center gap-2">
          <span class="w-5 h-5 rounded bg-white/20 flex items-center justify-center">
            <i data-lucide="message-circle" class="w-4 h-4"></i>
          </span>
          分享到 Line
        </button>
      </div>
    </div>
  </div>

  <div id="filterModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden items-end sm:items-center justify-center p-4" onclick="closeFilterModal()">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
      <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
        <div>
          <div class="text-lg font-black text-slate-800">篩選案件</div>
          <div class="text-xs text-slate-400 mt-1">可依緊急程度、狀態與職務篩選</div>
        </div>
        <button type="button" onclick="closeFilterModal()" class="w-9 h-9 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200 flex items-center justify-center">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-5 space-y-4">
        <div>
          <label for="urgencyFilter" class="block text-sm font-bold text-slate-700 mb-2">緊急程度</label>
          <select id="urgencyFilter" class="w-full px-4 py-3 bg-white border border-slate-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-base shadow-sm">
            <option value="all">全部</option>
            <option value="高">高</option>
            <option value="中">中</option>
            <option value="低">低</option>
          </select>
        </div>
        <div>
          <label for="statusFilter" class="block text-sm font-bold text-slate-700 mb-2">處理狀態</label>
          <select id="statusFilter" class="w-full px-4 py-3 bg-white border border-slate-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-base shadow-sm">
            <option value="all">全部</option>
            <option value="pending">待處理</option>
            <option value="resolved">已處理</option>
          </select>
        </div>
        <div>
          <label for="roleFilter" class="block text-sm font-bold text-slate-700 mb-2">職務</label>
          <select id="roleFilter" class="w-full px-4 py-3 bg-white border border-slate-300 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-base shadow-sm">
            <option value="all">全部</option>
          </select>
        </div>
        <div class="flex gap-3">
          <button type="button" onclick="resetFilters()" class="flex-1 py-3 rounded-2xl bg-slate-100 text-slate-700 font-bold hover:bg-slate-200 transition-colors">清除</button>
          <button type="button" onclick="applyFilters()" class="flex-1 py-3 rounded-2xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-colors">套用</button>
        </div>
      </div>
    </div>
  </div>

  <div id="photoModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 hidden items-center justify-center p-4" onclick="closePhotoModal()">
    <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
      <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
        <div>
          <div class="text-lg font-black text-slate-800">案件照片</div>
          <div id="photoModalMeta" class="text-xs text-slate-400 mt-1"></div>
        </div>
        <button type="button" onclick="closePhotoModal()" class="w-9 h-9 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200 flex items-center justify-center">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-4 bg-slate-50">
        <img id="photoModalImage" src="" alt="案件照片" class="w-full max-h-[70vh] object-contain rounded-2xl bg-white border border-slate-200">
      </div>
    </div>
  </div>

  <div id="selectionBar" class="fixed inset-x-0 bottom-0 z-40 hidden p-4 bg-white/90 backdrop-blur border-t border-slate-200">
    <div class="max-w-lg mx-auto flex items-center gap-2">
      <div id="selectionCount" class="text-sm font-black text-slate-800 flex-1">已選 0</div>
      <button type="button" onclick="toggleSelectAllVisible()" class="px-3 py-2 text-xs font-bold rounded-2xl bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors whitespace-nowrap">全選</button>
      <button type="button" onclick="clearSelectionMode()" class="px-3 py-2 text-xs font-bold rounded-2xl bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors whitespace-nowrap">取消</button>
      <button type="button" onclick="deleteSelectedReports()" class="px-3 py-2 text-xs font-black rounded-2xl bg-red-600 text-white hover:bg-red-700 transition-colors whitespace-nowrap">刪除</button>
    </div>
  </div>

  <script>
    const DEFAULT_APP_ID = 'default-attendance-app';
    const PUBLIC_SITE_ORIGIN = 'https://nw-com.github.io/nw-checkin-all-2026';
    const APP_ID = typeof window.__app_id === 'string' && window.__app_id.trim() ? window.__app_id.trim() : DEFAULT_APP_ID;
    let firestoreDb = null;
    let reportsCache = [];
    let unsubscribeAppeals = null;

    const pendingReportList = document.getElementById('pendingReportList');
    const resolvedReportList = document.getElementById('resolvedReportList');
    const handlingModal = document.getElementById('handlingModal');
    const filterModal = document.getElementById('filterModal');
    const photoModal = document.getElementById('photoModal');
    const photoModalImage = document.getElementById('photoModalImage');
    const photoModalMeta = document.getElementById('photoModalMeta');
    const handlingMethodInput = document.getElementById('handlingMethodInput');
    const urgencyFilterSelect = document.getElementById('urgencyFilter');
    const statusFilterSelect = document.getElementById('statusFilter');
    const roleFilterSelect = document.getElementById('roleFilter');
    const filterButtonLabel = document.getElementById('filterButtonLabel');
    const selectionBar = document.getElementById('selectionBar');
    const selectionCountEl = document.getElementById('selectionCount');
    const appealShareModal = document.getElementById('appealShareModal');
    const appealShareQrEl = document.getElementById('appealShareQr');
    const appealShareUrlEl = document.getElementById('appealShareUrl');
    let activeReportId = '';
    const currentFilters = {
      urgency: 'all',
      status: 'all',
      role: 'all'
    };
    let selectionMode = false;
    let selectedReportIds = new Set();
    let lastVisibleReportIds = [];
    let pressTimer = null;
    let longPressTriggered = false;
    let appealShareUrl = '';

    function getFirestoreDb() {
      if (!window.firebase) throw new Error('Firebase SDK 未載入');
      if (!window.FIREBASE_CONFIG) throw new Error('缺少 firebase-config.js 或 FIREBASE_CONFIG');
      if (!firebase.apps || firebase.apps.length === 0) firebase.initializeApp(window.FIREBASE_CONFIG);
      return firebase.firestore();
    }

    function getAppealsCollection(db) {
      return db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('appeals');
    }

    function formatReportDate(date) {
      const d = date instanceof Date ? date : new Date(date);
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hour = String(d.getHours()).padStart(2, '0');
      const minute = String(d.getMinutes()).padStart(2, '0');
      return `${month}/${day} ${hour}:${minute}`;
    }

    function normalizeReport(doc) {
      const data = doc.data() || {};
      const createdAt = data.createdAt && typeof data.createdAt.toDate === 'function' ? data.createdAt.toDate() : new Date(data.clientCreatedAt || data.createdAt || 0);
      const dateText = data.date ? String(data.date) : formatReportDate(createdAt);
      return {
        id: doc.id,
        createdAt: createdAt.toISOString(),
        date: dateText,
        community: data.community || '',
        role: data.role || '',
        name: data.name || '',
        contactPhone: data.contactPhone || '',
        category: data.category || '',
        urgency: data.urgency || '中',
        description: data.description || '',
        status: data.status || '未處理',
        handlingMethod: data.handlingMethod || '',
        photo: data.photo || null,
        deleted: !!data.deleted
      };
    }

    function updateLocalReport(reportId, patch) {
      const id = String(reportId || '');
      const idx = reportsCache.findIndex(r => String(r.id) === id);
      if (idx === -1) return;
      reportsCache[idx] = { ...reportsCache[idx], ...patch };
    }

    async function updateAppealDoc(reportId, patch) {
      if (!firestoreDb) return;
      const id = String(reportId || '');
      if (!id) return;
      updateLocalReport(id, patch);
      renderReports();
      try {
        await getAppealsCollection(firestoreDb).doc(id).set(
          { ...patch, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
          { merge: true }
        );
      } catch (_) {}
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function findReportById(reportId) {
      return reportsCache.find(report => String(report.id) === String(reportId || '')) || null;
    }

    function normalizePhoneForTel(phone) {
      return String(phone || '').trim().replace(/[^\d+]/g, '');
    }

    function buildAppealDetailUrl(reportId) {
      return `${PUBLIC_SITE_ORIGIN}/appeal-detail.html?id=${encodeURIComponent(String(reportId || ''))}`;
    }

    function buildLineShareText(report, handlingMethod) {
      const detailUrl = buildAppealDetailUrl(report.id);
      const lines = [
        '總經理直通車案件',
        `社區：${report.community || ''}`,
        `分類：${report.category || ''}`,
        `緊急程度：${report.urgency || ''}`,
        `回報人：${report.name || ''} (${report.role || ''})`,
        `聯絡電話：${report.contactPhone || '未填寫'}`,
        `案件內容：${report.description || ''}`,
        `處理方式：${handlingMethod || '尚未填寫'}`,
        '',
        `案件連結：${detailUrl}`
      ];
      return lines.join('\n');
    }

    function buildAppealShareUrl() {
      return 'https://nw-com.github.io/nw-checkin-all-2026/appeal.html';
    }

    function openAppealShareModal() {
      appealShareUrl = buildAppealShareUrl();
      if (appealShareUrlEl) appealShareUrlEl.textContent = appealShareUrl;
      if (appealShareQrEl) {
        appealShareQrEl.innerHTML = '';
        try {
          appealShareQrEl.innerHTML = `<img src="./photo/qr001.jpg" alt="申訴 QR Code" class="w-[220px] h-[220px] object-contain rounded-2xl bg-white" />`;
        } catch (_) {}
      }
      if (appealShareModal) {
        appealShareModal.classList.remove('hidden');
        appealShareModal.classList.add('flex');
      }
      lucide.createIcons();
    }

    function closeAppealShareModal() {
      if (appealShareModal) {
        appealShareModal.classList.add('hidden');
        appealShareModal.classList.remove('flex');
      }
    }

    async function getAppealQrFile() {
      try {
        const res = await fetch('./photo/qr001.jpg', { cache: 'reload' });
        if (!res.ok) return null;
        const blob = await res.blob();
        return new File([blob], 'qr001.jpg', { type: blob.type || 'image/jpeg' });
      } catch (_) {
        return null;
      }
    }

    async function shareAppealToLine() {
      if (!appealShareUrl) appealShareUrl = buildAppealShareUrl();
      const lineUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(appealShareUrl)}`;
      window.open(lineUrl, '_blank', 'noopener');
    }

    window.openAppealShareModal = openAppealShareModal;
    window.closeAppealShareModal = closeAppealShareModal;
    window.shareAppealToLine = shareAppealToLine;

    function updateSelectionBar() {
      const count = selectedReportIds.size;
      if (!selectionMode || count === 0) {
        if (selectionBar) selectionBar.classList.add('hidden');
        return;
      }
      if (selectionBar) selectionBar.classList.remove('hidden');
      if (selectionCountEl) selectionCountEl.textContent = `已選 ${count}`;
      const selectAllBtn = selectionBar ? selectionBar.querySelector('button[onclick="toggleSelectAllVisible()"]') : null;
      if (selectAllBtn) {
        const allSelected = lastVisibleReportIds.length > 0 && lastVisibleReportIds.every(id => selectedReportIds.has(String(id)));
        selectAllBtn.textContent = allSelected ? '取消全選' : '全選';
      }
    }

    function enterSelectionMode(initialReportId) {
      selectionMode = true;
      selectedReportIds = new Set(selectedReportIds);
      if (initialReportId) selectedReportIds.add(String(initialReportId));
      updateSelectionBar();
      renderReports();
    }

    function clearSelectionMode() {
      selectionMode = false;
      selectedReportIds = new Set();
      updateSelectionBar();
      renderReports();
    }

    function toggleSelectReport(reportId) {
      const id = String(reportId || '');
      if (!id) return;
      if (!selectionMode) {
        enterSelectionMode(id);
        return;
      }
      const next = new Set(selectedReportIds);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      selectedReportIds = next;
      if (selectedReportIds.size === 0) {
        clearSelectionMode();
        return;
      }
      updateSelectionBar();
      renderReports();
    }

    function toggleSelectAllVisible() {
      if (!selectionMode) selectionMode = true;
      const visible = Array.isArray(lastVisibleReportIds) ? lastVisibleReportIds.map(id => String(id)) : [];
      if (visible.length === 0) return;
      const allSelected = visible.every(id => selectedReportIds.has(id));
      selectedReportIds = allSelected ? new Set() : new Set(visible);
      if (selectedReportIds.size === 0) {
        clearSelectionMode();
        return;
      }
      updateSelectionBar();
      renderReports();
    }

    async function deleteSelectedReports() {
      if (!selectionMode) return;
      const ids = Array.from(selectedReportIds);
      if (ids.length === 0) return;
      const ok = confirm(`確定刪除選取的 ${ids.length} 筆案件？`);
      if (!ok) return;
      const patch = { deleted: true, deletedAt: firebase.firestore.FieldValue.serverTimestamp() };
      ids.forEach((id) => {
        updateLocalReport(id, patch);
      });
      reportsCache = reportsCache.filter(r => !ids.includes(String(r.id)));
      renderReports();
      updateSelectionBar();
      await Promise.all(ids.map((id) => updateAppealDoc(id, patch)));
      clearSelectionMode();
    }

    function onCardPointerDown(e, reportId) {
      if (selectionMode) return;
      longPressTriggered = false;
      if (pressTimer) clearTimeout(pressTimer);
      pressTimer = setTimeout(() => {
        longPressTriggered = true;
        enterSelectionMode(reportId);
      }, 520);
    }

    function onCardPointerUp() {
      if (pressTimer) clearTimeout(pressTimer);
      pressTimer = null;
    }

    function onCardPointerMove() {
      if (pressTimer) clearTimeout(pressTimer);
      pressTimer = null;
    }

    function onCardClick(e, reportId) {
      if (longPressTriggered) {
        e.preventDefault();
        e.stopPropagation();
        return;
      }
      if (selectionMode) {
        e.preventDefault();
        e.stopPropagation();
        toggleSelectReport(reportId);
      }
    }

    function openHandlingModal(reportId) {
      if (selectionMode) {
        toggleSelectReport(reportId);
        return;
      }
      const report = findReportById(reportId);
      if (!report) return;
      activeReportId = String(report.id);
      if (report.status !== '已處理') updateAppealDoc(activeReportId, { status: '已處理' });
      document.getElementById('handlingModalTitle').textContent = `${report.community} / ${report.category}`;
      document.getElementById('handlingModalMeta').textContent = `${report.name} (${report.role}) | 目前狀態：${report.status || '未處理'}`;
      handlingMethodInput.value = String(report.handlingMethod || '');
      renderReports();
      handlingModal.classList.remove('hidden');
      handlingModal.classList.add('flex');
      handlingMethodInput.focus();
      lucide.createIcons();
    }

    function closeHandlingModal() {
      activeReportId = '';
      handlingModal.classList.add('hidden');
      handlingModal.classList.remove('flex');
    }

    function saveHandlingMethod() {
      if (!activeReportId) return;
      updateAppealDoc(activeReportId, { handlingMethod: handlingMethodInput.value.trim(), status: '已處理' });
      closeHandlingModal();
    }

    function shareHandlingToLine() {
      if (!activeReportId) return;
      const target = findReportById(activeReportId);
      if (!target) return;
      const handlingMethod = handlingMethodInput.value.trim();
      updateAppealDoc(activeReportId, { handlingMethod, status: '已處理' });
      const text = buildLineShareText(target, handlingMethod);
      const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
      window.open(lineUrl, '_blank', 'noopener');
      renderReports();
    }

    function openPhotoModal(reportId) {
      if (selectionMode) {
        toggleSelectReport(reportId);
        return;
      }
      const report = findReportById(reportId);
      const photo = report && report.photo ? report.photo : null;
      if (!report || !photo || !photo.dataUrl) return;
      photoModalImage.src = photo.dataUrl;
      photoModalImage.alt = `${report.community || ''} 案件照片`;
      photoModalMeta.textContent = `${report.community || ''} / ${report.category || ''}`;
      photoModal.classList.remove('hidden');
      photoModal.classList.add('flex');
      lucide.createIcons();
    }

    function closePhotoModal() {
      photoModalImage.src = '';
      photoModalImage.alt = '案件照片';
      photoModalMeta.textContent = '';
      photoModal.classList.add('hidden');
      photoModal.classList.remove('flex');
    }

    function dialContactPhone(event, phone) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      const normalized = normalizePhoneForTel(phone);
      if (!normalized) return;
      window.location.href = `tel:${normalized}`;
    }

    function openPublicAppealDetail(event, reportId) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      const detailUrl = buildAppealDetailUrl(reportId);
      if (!detailUrl) return;
      window.open(detailUrl, '_blank', 'noopener');
    }

    function sortReports(reports) {
      return [...reports].sort((a, b) => {
        const timeA = new Date(a.createdAt || '').getTime() || 0;
        const timeB = new Date(b.createdAt || '').getTime() || 0;
        return timeB - timeA;
      });
    }

    function populateRoleFilterOptions(reports) {
      const roles = Array.from(new Set((reports || []).map(report => String(report.role || '').trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b, 'zh-Hant'));
      roleFilterSelect.innerHTML = '<option value="all">全部</option>';
      roles.forEach((role) => {
        const option = document.createElement('option');
        option.value = role;
        option.textContent = role;
        roleFilterSelect.appendChild(option);
      });
      roleFilterSelect.value = currentFilters.role;
      if (!Array.from(roleFilterSelect.options).some(option => option.value === currentFilters.role)) {
        currentFilters.role = 'all';
        roleFilterSelect.value = 'all';
      }
    }

    function syncFilterInputs() {
      urgencyFilterSelect.value = currentFilters.urgency;
      statusFilterSelect.value = currentFilters.status;
      roleFilterSelect.value = currentFilters.role;
    }

    function getActiveFilterCount() {
      return ['urgency', 'status', 'role'].filter((key) => currentFilters[key] !== 'all').length;
    }

    function updateFilterButtonLabel() {
      const count = getActiveFilterCount();
      filterButtonLabel.textContent = count > 0 ? `篩選 (${count})` : '篩選';
    }

    function openFilterModal() {
      populateRoleFilterOptions(reportsCache);
      syncFilterInputs();
      filterModal.classList.remove('hidden');
      filterModal.classList.add('flex');
      lucide.createIcons();
    }

    function closeFilterModal() {
      filterModal.classList.add('hidden');
      filterModal.classList.remove('flex');
    }

    function applyFilters() {
      currentFilters.urgency = urgencyFilterSelect.value;
      currentFilters.status = statusFilterSelect.value;
      currentFilters.role = roleFilterSelect.value;
      updateFilterButtonLabel();
      renderReports();
      closeFilterModal();
    }

    function resetFilters() {
      currentFilters.urgency = 'all';
      currentFilters.status = 'all';
      currentFilters.role = 'all';
      syncFilterInputs();
      updateFilterButtonLabel();
      renderReports();
      closeFilterModal();
    }

    function matchesFilters(report) {
      const matchesUrgency = currentFilters.urgency === 'all' || String(report.urgency || '') === currentFilters.urgency;
      const isResolved = String(report.status || '') === '已處理';
      const matchesStatus = currentFilters.status === 'all'
        || (currentFilters.status === 'pending' && !isResolved)
        || (currentFilters.status === 'resolved' && isResolved);
      const matchesRole = currentFilters.role === 'all' || String(report.role || '') === currentFilters.role;
      return matchesUrgency && matchesStatus && matchesRole;
    }

    function getReportCardHtml(report, index) {
      let urgencyStyles = '';
      let statusStyles = '';
      const hasPhoto = !!(report && report.photo && report.photo.dataUrl);
      const hasContactPhone = !!String(report.contactPhone || '').trim();
      const reportId = String(report.id || '');
      const isSelected = selectionMode && selectedReportIds.has(reportId);
      const cardRing = isSelected ? 'ring-2 ring-blue-500 border-blue-200' : 'border-slate-200';

      if (report.urgency === '高') urgencyStyles = 'bg-red-100 text-red-700 border-red-200';
      else if (report.urgency === '中') urgencyStyles = 'bg-yellow-100 text-yellow-700 border-yellow-200';
      else urgencyStyles = 'bg-green-100 text-green-700 border-green-200';

      if (report.status === '未處理') statusStyles = 'text-red-500 bg-red-50';
      else if (report.status === '處理中') statusStyles = 'text-blue-600 bg-blue-50';
      else if (report.status === '已處理') statusStyles = 'text-green-600 bg-green-50';
      else statusStyles = 'text-slate-500 bg-slate-100';

      return `
        <article class="bg-white rounded-2xl shadow-sm border ${cardRing} overflow-hidden card-enter relative" style="animation-delay: ${index * 0.1}s"
          onpointerdown='onCardPointerDown(event, ${JSON.stringify(reportId)})'
          onpointerup="onCardPointerUp()"
          onpointercancel="onCardPointerUp()"
          onpointermove="onCardPointerMove()"
          onclick='onCardClick(event, ${JSON.stringify(reportId)})'>
          ${selectionMode ? `
            <div class="absolute top-3 right-3 w-6 h-6 rounded-full flex items-center justify-center border ${isSelected ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-slate-300 text-transparent'}">
              <i data-lucide="check" class="w-4 h-4"></i>
            </div>
          ` : ''}
          <div class="p-4">
            <div class="flex justify-between items-center mb-3">
              <span class="px-2.5 py-1 text-xs font-bold rounded-md border ${urgencyStyles}">
                ${escapeHtml(report.urgency)}急
              </span>
              <div class="flex items-center text-xs text-slate-400 font-medium">
                <i data-lucide="clock" class="w-3.5 h-3.5 mr-1"></i> ${escapeHtml(report.date)}
              </div>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-1">${escapeHtml(report.community)}</h3>
            <div class="inline-block bg-blue-50 text-blue-700 text-xs font-bold px-2 py-1 rounded mb-3">
              ${escapeHtml(report.category)}
            </div>
            <div class="flex items-start gap-3 mb-4">
              <p class="flex-1 text-slate-600 text-sm leading-relaxed mb-0">
                ${escapeHtml(report.description)}
              </p>
              ${hasPhoto ? `
                <button type="button" onclick='openPhotoModal(${JSON.stringify(reportId)})' class="w-8 h-8 rounded-xl bg-slate-100 text-slate-600 hover:bg-blue-50 hover:text-blue-600 flex items-center justify-center transition-colors shrink-0" title="查看照片">
                  <i data-lucide="image" class="w-4 h-4"></i>
                </button>
              ` : ''}
            </div>
            <div class="flex justify-between items-end border-t border-slate-100 pt-3 gap-3">
              <div class="flex items-center gap-2 text-sm text-slate-500 font-medium">
                <div class="flex items-center">
                  <div class="bg-slate-100 p-1.5 rounded-full mr-2">
                    <i data-lucide="user" class="w-4 h-4 text-slate-600"></i>
                  </div>
                  <span>${escapeHtml(report.name)} <span class="text-slate-400 text-xs ml-1">(${escapeHtml(report.role)})</span></span>
                </div>
              </div>
              <div class="flex items-center gap-2 shrink-0">
                ${hasContactPhone ? `
                  <button
                    type="button"
                    onclick='dialContactPhone(event, ${JSON.stringify(report.contactPhone)})'
                    onpointerdown="event.stopPropagation()"
                    class="w-8 h-8 rounded-xl bg-emerald-50 text-emerald-600 hover:bg-emerald-100 flex items-center justify-center transition-colors"
                    title="撥打聯絡電話">
                    <i data-lucide="phone-call" class="w-4 h-4"></i>
                  </button>
                ` : ''}
                <span onclick='openHandlingModal(${JSON.stringify(reportId)})' class="text-xs font-bold px-2.5 py-1 rounded-full ${statusStyles} cursor-pointer hover:opacity-80 transition-opacity whitespace-nowrap" title="點擊填寫處理方式並分享到 Line">
                  ${escapeHtml(report.status)}
                </span>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function renderReports() {
      const reports = sortReports(reportsCache);
      populateRoleFilterOptions(reports);
      updateFilterButtonLabel();
      const filteredReports = reports.filter(matchesFilters);
      lastVisibleReportIds = filteredReports.map(r => String(r.id || '')).filter(Boolean);
      const pendingReports = filteredReports.filter(r => r.status !== '已處理');
      const resolvedReports = filteredReports.filter(r => r.status === '已處理');
      document.getElementById('pendingHighCount').textContent = pendingReports.filter(r => r.urgency === '高').length;
      document.getElementById('pendingMediumCount').textContent = pendingReports.filter(r => r.urgency === '中').length;
      document.getElementById('pendingLowCount').textContent = pendingReports.filter(r => r.urgency === '低').length;
      pendingReportList.innerHTML = '';
      resolvedReportList.innerHTML = '';

      if (reports.length === 0) {
        pendingReportList.innerHTML = `
          <article class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center text-slate-400">
            <i data-lucide="inbox" class="w-10 h-10 mx-auto mb-3"></i>
            <p class="font-bold text-slate-500 mb-1">目前沒有案件</p>
            <p class="text-sm">現場送出申訴後，這裡會即時顯示。</p>
          </article>
        `;
        resolvedReportList.innerHTML = `
          <article class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center text-slate-400">
            <i data-lucide="archive" class="w-10 h-10 mx-auto mb-3"></i>
            <p class="font-bold text-slate-500 mb-1">目前沒有已處理案件</p>
          </article>
        `;
        lucide.createIcons();
        return;
      }

      if (filteredReports.length === 0) {
        pendingReportList.innerHTML = `
          <article class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center text-slate-400">
            <i data-lucide="filter-x" class="w-10 h-10 mx-auto mb-3"></i>
            <p class="font-bold text-slate-500 mb-1">沒有符合篩選條件的案件</p>
            <p class="text-sm">請調整篩選條件後再試一次。</p>
          </article>
        `;
        resolvedReportList.innerHTML = `
          <article class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center text-slate-400">
            <i data-lucide="filter-x" class="w-10 h-10 mx-auto mb-3"></i>
            <p class="font-bold text-slate-500 mb-1">目前沒有符合條件的已處理案件</p>
          </article>
        `;
        lucide.createIcons();
        return;
      }

      if (pendingReports.length === 0) {
        pendingReportList.innerHTML = `
          <article class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center text-slate-400">
            <i data-lucide="list-todo" class="w-10 h-10 mx-auto mb-3"></i>
            <p class="font-bold text-slate-500 mb-1">目前沒有未處理案件</p>
          </article>
        `;
      } else {
        pendingReports.forEach((report, index) => {
          pendingReportList.insertAdjacentHTML('beforeend', getReportCardHtml(report, index));
        });
      }

      if (resolvedReports.length === 0) {
        resolvedReportList.innerHTML = `
          <article class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center text-slate-400">
            <i data-lucide="archive" class="w-10 h-10 mx-auto mb-3"></i>
            <p class="font-bold text-slate-500 mb-1">目前沒有已處理案件</p>
          </article>
        `;
      } else {
        resolvedReports.forEach((report, index) => {
          resolvedReportList.insertAdjacentHTML('beforeend', getReportCardHtml(report, index));
        });
      }

      lucide.createIcons();
      updateSelectionBar();
    }

    function startRealtime() {
      try {
        firestoreDb = getFirestoreDb();
      } catch (err) {
        pendingReportList.innerHTML = `
          <article class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center text-slate-400">
            <i data-lucide="alert-triangle" class="w-10 h-10 mx-auto mb-3"></i>
            <p class="font-bold text-slate-500 mb-1">無法載入案件</p>
            <p class="text-sm">${escapeHtml(String(err && err.message ? err.message : err))}</p>
          </article>
        `;
        resolvedReportList.innerHTML = '';
        lucide.createIcons();
        return;
      }

      if (typeof unsubscribeAppeals === 'function') unsubscribeAppeals();
      unsubscribeAppeals = getAppealsCollection(firestoreDb)
        .orderBy('createdAt', 'desc')
        .limit(200)
        .onSnapshot((snap) => {
          reportsCache = snap.docs.map(normalizeReport).filter(r => !r.deleted);
          renderReports();
        }, () => {});

      renderReports();
    }

    startRealtime();
  </script>
</body>
</html>
