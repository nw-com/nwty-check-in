    <script>
        lucide.createIcons();

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-attendance-app';

        let fbUser = null;
        let dbUser = null;
        let selectedCommunityId = '';
        let selectedCommunityName = '';
        let db = null;
        let settingsDocRef = null;
        let recordsUnsub = null;
        let settingsUnsub = null;
        let usersUnsub = null;
        let rolesUnsub = null;

        let records = [];
        let selectedRecordsDate = new Date();
        let canManageSettings = false;
        let pendingConfirmAction = null;
        let isPublicView = false;
        let editRecordId = null;
        let communityUsers = [];
        let roles = [];
        let penaltyImages = []; // 存儲新增時的圖片
        let editImages = []; // 存儲編輯時的圖片

        function normalizeKey(v) {
            return String(v || '').replace(/\uFEFF/g, '').trim();
        }

        function escapeHtml(s) {
            return String(s || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // 圖片壓縮函數
        function compressImage(file, maxWidth = 600, maxHeight = 600, quality = 0.5) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        // 計算縮放比例
                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round((width * maxHeight) / height);
                                height = maxHeight;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedDataUrl);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // 圖片上傳處理函數
        function setupImageUpload(inputId, previewId, isEdit = false) {
            const input = document.getElementById(inputId);
            if (!input) return;
            
            input.onchange = async (e) => {
                const images = isEdit ? editImages : penaltyImages;
                const files = Array.from(e.target.files);
                const remainingSlots = 3 - images.length;
                
                if (files.length > remainingSlots) {
                    alert(`最多只能上傳3張圖片，還可以上傳${remainingSlots}張`);
                    files.splice(remainingSlots);
                }
                
                for (const file of files) {
                    if (file.type.startsWith('image/')) {
                        try {
                            // 檢查文件大小
                            if (file.size > 5 * 1024 * 1024) { // 5MB
                                alert('圖片大小不能超過5MB，請選擇較小的圖片');
                                continue;
                            }
                            
                            const compressedImage = await compressImage(file);
                            images.push(compressedImage);
                            renderImagePreview(previewId, isEdit);
                        } catch (error) {
                            console.error('圖片壓縮失敗:', error);
                            alert('圖片處理失敗，請重試');
                        }
                    }
                }
                
                input.value = ''; // 重置input
            };
        }

        // 渲染圖片預覽
        function renderImagePreview(previewId, isEdit = false) {
            const preview = document.getElementById(previewId);
            if (!preview) return;
            
            const images = isEdit ? editImages : penaltyImages;
            const safeImages = images || [];
            
            preview.innerHTML = safeImages.map((img, index) => `
                <div class="relative">
                    <img src="${img}" class="w-full h-24 object-cover rounded-lg border border-gray-200">
                    <button onclick="removeImage('${previewId}', ${index})" 
                            class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center hover:bg-red-600 transition">
                        <i data-lucide="x" size="12"></i>
                    </button>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        // 移除圖片
        function removeImage(previewId, index) {
            if (previewId === 'penalty-image-preview') {
                penaltyImages.splice(index, 1);
                renderImagePreview(previewId, false);
            } else if (previewId === 'edit-image-preview') {
                editImages.splice(index, 1);
                renderImagePreview(previewId, true);
            }
        }

        // 重置圖片上傳區域
        function resetImageUpload(previewId, isEdit = false) {

        function switchView(view) {
            document.querySelectorAll('.view-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('#page-nav button').forEach(el => el.classList.remove('text-red-600'));
            document.querySelectorAll('#page-nav button').forEach(el => el.classList.add('text-gray-400'));
            
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`nav-${view}`).classList.remove('text-gray-400');
            document.getElementById(`nav-${view}`).classList.add('text-red-600');

            if (view === 'records') {

                renderRecords();
            } else if (view === 'stats') {
                renderStats();
            }
        }

        function formatDateLabel(d) {
            if (!d) return '';
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const w = ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
            return `${y}/${m}/${day} (週${w})`;
        }

        function formatYmd(d) {
            if (!d) return '';
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function formatDateTime(d) {
            if (!d) return '';
            const date = d.toDate ? d.toDate() : new Date(d);
            return date.toLocaleString('zh-TW');
        }

        function updateRecordsDateLabel() {
            const el = document.getElementById('records-date-label');
            if (el) el.textContent = formatDateLabel(selectedRecordsDate);
        }

        function changeRecordsDate(deltaDays) {
            const next = new Date(selectedRecordsDate);
            next.setDate(next.getDate() + (Number(deltaDays) || 0));
            
            // 获取今天的日期（去掉时间部分）
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // 检查是否是未来日期
            const nextDateOnly = new Date(next);
            nextDateOnly.setHours(0, 0, 0, 0);
            
            // 如果是未来日期，不允许选择
            if (nextDateOnly > today) {
                return;
            }
            
            selectedRecordsDate = next;
            updateRecordsDateLabel();
            updateDateNavButtons();
            subscribeRecordsForDate(selectedRecordsDate);
            renderRecords();
        }
        
        function updateDateNavButtons() {
            // 获取今天的日期（去掉时间部分）
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // 检查当前选择日期是否是今天
            const currentDateOnly = new Date(selectedRecordsDate);
            currentDateOnly.setHours(0, 0, 0, 0);
            
            const rightBtn = document.querySelector('#records-date-nav button:last-child');
            if (rightBtn) {
                if (currentDateOnly >= today) {
                    rightBtn.disabled = true;
                    rightBtn.classList.add('opacity-30', 'cursor-not-allowed');
                    rightBtn.classList.remove('hover:bg-gray-100');
                } else {
                    rightBtn.disabled = false;
                    rightBtn.classList.remove('opacity-30', 'cursor-not-allowed');
                    rightBtn.classList.add('hover:bg-gray-100');
                }
            }
        }

        function subscribeRecordsForDate(d) {
            if (!settingsDocRef) return;
            if (recordsUnsub) { try { recordsUnsub(); } catch {} recordsUnsub = null; }

            const start = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0, 0);
            const end = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1, 0, 0, 0, 0);
            const startTs = firebase.firestore.Timestamp.fromDate(start);
            const endTs = firebase.firestore.Timestamp.fromDate(end);

            const recordsQuery = settingsDocRef
                .collection('penalties')
                .where('createdAt', '>=', startTs)
                .where('createdAt', '<', endTs)
                .orderBy('createdAt', 'desc')
                .limit(200);

            recordsUnsub = recordsQuery.onSnapshot((snapshot) => {
                const list = [];
                snapshot.forEach((doc) => list.push({ id: doc.id, ...doc.data() }));
                records = list;
                updatePenaltyCount();
                if (!document.getElementById('view-records')?.classList.contains('hidden')) renderRecords();
            }, () => {
                records = [];
                updatePenaltyCount();
                const container = document.getElementById('records-container');
                if (container) {
                    container.innerHTML = `<div class="text-center py-10 text-gray-400"><i data-lucide="alert-triangle" size="48" class="mx-auto mb-2 opacity-20"></i><p>無法讀取罰扣記錄</p></div>`;
                    lucide.createIcons();
                }
            });
        }

        async function addPenalty() {
            const name = normalizeKey(document.getElementById('penalty-name')?.value);
            const category = normalizeKey(document.getElementById('penalty-category')?.value);
            const type = normalizeKey(document.getElementById('penalty-type')?.value);
            const unit = normalizeKey(document.getElementById('penalty-unit')?.value);
            const amount = Number(document.getElementById('penalty-amount')?.value);
            const reason = normalizeKey(document.getElementById('penalty-reason')?.value);

            if (!name || !category || !type || !unit || !amount) {
                alert('請填寫完整資訊');
                return;
            }

            if (!settingsDocRef) return;

            // 找到按鈕並顯示載入狀態
            const button = document.querySelector('button[onclick="addPenalty()"]');
            const originalText = button.innerHTML;
            button.innerHTML = '<i data-lucide="loader-2" class="animate-spin mr-2"></i> 保存中...';
            button.disabled = true;
            lucide.createIcons();

            try {
                await settingsDocRef.collection('penalties').add({
                    name: name,
                    category: category,
                    type: type,
                    unit: unit,
                    amount: amount,
                    reason: reason,
                    images: penaltyImages, // 保存圖片
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    createdBy: dbUser?.uid || 'anonymous'
                });

                document.getElementById('penalty-name').value = '';
                document.getElementById('penalty-category').value = '';
                document.getElementById('penalty-type').innerHTML = '<option value="">請先選擇類別</option>';
                document.getElementById('penalty-unit').value = '';
                updateAmountLabel();
                document.getElementById('penalty-amount').value = '';
                document.getElementById('penalty-reason').value = '';
                resetImageUpload('penalty-image-preview', false); // 重置圖片上傳區域

                const modal = document.getElementById('success-modal');
                if (modal) modal.classList.remove('hidden');
            } catch (e) {
                console.error('新增失敗:', e);
                alert('新增失敗，請稍後再試。如果圖片較大，請嘗試刪除一些圖片。');
            } finally {
                // 恢復按鈕狀態
                button.innerHTML = originalText;
                button.disabled = false;
                lucide.createIcons();
            }
        }

        async function shareToLine() {
            // 找到公告彈窗的主要內容容器（不含按鈕區域）
            const noticeModal = document.getElementById('notice-modal');
            const modalContent = noticeModal.querySelector('.bg-white');
            
            try {
                // 顯示載入狀態
                const button = document.querySelector('button[onclick="shareToLine()"]');
                const originalText = button.innerHTML;
                button.innerHTML = '<i data-lucide="loader-2" class="animate-spin mr-2"></i> 處理中...';
                button.disabled = true;
                lucide.createIcons();
                
                // 先隱藏按鈕區域以便截圖
                const buttonArea = modalContent.querySelector('.sticky.bottom-0');
                const originalButtonDisplay = buttonArea.style.display;
                buttonArea.style.display = 'none';
                
                // 使用html2canvas截圖
                const canvas = await html2canvas(modalContent, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });
                
                // 恢復按鈕區域顯示
                buttonArea.style.display = originalButtonDisplay;
                
                // 將canvas轉換為圖片
                const imageData = canvas.toDataURL('image/png');
                
                // 檢查是否支持 Web Share API
                const canShare = 'share' in navigator && 'canShare' in navigator;
                
                // 創建分享按鈕的 HTML
                let shareButtonsHtml = '';
                
                if (canShare) {
                    shareButtonsHtml = `
                        <button onclick="shareViaWebShare('${imageData}')" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition flex items-center justify-center gap-2 mb-2">
                            <i data-lucide="share-2" size="18"></i>
                            分享到 Line
                        </button>
                    `;
                }
                
                shareButtonsHtml += `
                    <a href="${imageData}" download="獎懲公告.png" class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition flex items-center justify-center gap-2">
                        <i data-lucide="download" size="18"></i>
                        下載圖片
                    </a>
                `;
                
                // 創建一個臨時彈窗顯示圖片並提供分享選項
                const shareModalHtml = `
                    <div id="share-modal" class="fixed inset-0 bg-black/50 z-[200] flex items-center justify-center p-4 overflow-y-auto" onclick="closeShareModal()">
                        <div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl my-auto overflow-hidden" onclick="event.stopPropagation()">
                            <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                                <div class="font-black text-gray-800 text-base">分享圖片</div>
                                <button onclick="closeShareModal()" class="p-1 rounded-full hover:bg-gray-100 text-gray-500">
                                    <i data-lucide="x" size="18"></i>
                                </button>
                            </div>
                            <div class="p-4">
                                <img src="${imageData}" class="w-full rounded-lg border border-gray-200 mb-4" alt="獎懲公告" />
                                <p class="text-sm text-gray-500 text-center mb-4">${canShare ? '點擊下方按鈕分享到 Line' : '長按圖片保存後分享到 Line'}</p>
                            </div>
                            <div class="px-5 py-4 border-t border-gray-100 space-y-2">
                                ${shareButtonsHtml}
                                <button onclick="closeShareModal()" class="w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-200 transition">關閉</button>
                            </div>
                        </div>
                    </div>
                `;
                
                // 添加到頁面
                document.body.insertAdjacentHTML('beforeend', shareModalHtml);
                lucide.createIcons();
                
                // 恢復按鈕狀態
                button.innerHTML = originalText;
                button.disabled = false;
                lucide.createIcons();
                
            } catch (error) {
                console.error('截圖失敗:', error);
                alert('截圖失敗，請稍後重試！');
                
                // 恢復按鈕狀態
                const button = document.querySelector('button[onclick="shareToLine()"]');
                if (button) {
                    button.innerHTML = '<i data-lucide="message-circle" size="18"></i> Line 分享';
                    button.disabled = false;
                    lucide.createIcons();
                }
            }
        }

            const modal = document.getElementById('share-modal');
            if (modal) {
                modal.remove();
            }
        }

        async function shareViaWebShare(imageData) {
            try {
                // 將 base64 圖片轉換為 Blob
                const response = await fetch(imageData);
                const blob = await response.blob();
                
                // 創建 File 對象
                const file = new File([blob], '獎懲公告.png', { type: 'image/png' });
                
                // 使用 Web Share API 分享
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        title: '獎懲公告',
                        text: '西北保全股份有限公司 獎懲公告',
                        files: [file]
                    });
                    closeShareModal();
                } else {
                    // 如果不支持分享文件，只分享文字
                    await navigator.share({
                        title: '獎懲公告',
                        text: '西北保全股份有限公司 獎懲公告'
                    });
                }
            } catch (error) {
                console.error('分享失敗:', error);
                if (error.name !== 'AbortError') {
                    alert('分享失敗，請嘗試下載圖片後手動分享');
                }
            }
        }

        function openEditModal(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;

            editRecordId = id;
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = record.name || '';
            document.getElementById('edit-category').value = record.category || 'penalty';
            
            updateTypeOptions();
            
            setTimeout(() => {
                document.getElementById('edit-type').value = record.type || '';
            }, 50);
            
            document.getElementById('edit-unit').value = record.unit || 'money';
            updateAmountLabel();
            document.getElementById('edit-amount').value = record.amount || 0;
            document.getElementById('edit-reason').value = record.reason || '';
            
            // 加載圖片
            editImages = [...(record.images || [])];
            renderImagePreview('edit-image-preview', true);

            const modal = document.getElementById('edit-modal');
            if (modal) modal.classList.remove('hidden');
        }

        function closeEditModal() {
            const modal = document.getElementById('edit-modal');
            if (modal) modal.classList.add('hidden');
            editRecordId = null;
            resetImageUpload('edit-image-preview', true); // 重置圖片上傳區域
        }

        async function saveEdit() {
            if (!editRecordId || !settingsDocRef) return;

            const name = normalizeKey(document.getElementById('edit-name')?.value);
            const category = normalizeKey(document.getElementById('edit-category')?.value);
            const type = normalizeKey(document.getElementById('edit-type')?.value);
            const unit = normalizeKey(document.getElementById('edit-unit')?.value);
            const amount = Number(document.getElementById('edit-amount')?.value);
            const reason = normalizeKey(document.getElementById('edit-reason')?.value);

            if (!name || !category || !type || !unit || !amount) {
                alert('請填寫完整資訊');
                return;
            }

            // 找到按鈕並顯示載入狀態
            const button = document.querySelector('button[onclick="saveEdit()"]');
            const originalText = button.innerHTML;
            button.innerHTML = '<i data-lucide="loader-2" class="animate-spin mr-2"></i> 保存中...';
            button.disabled = true;
            lucide.createIcons();

            try {
                await settingsDocRef.collection('penalties').doc(editRecordId).update({
                    name: name,
                    category: category,
                    type: type,
                    unit: unit,
                    amount: amount,
                    reason: reason,
                    images: editImages, // 保存圖片
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                closeEditModal();
            } catch (e) {
                console.error('儲存失敗:', e);
                alert('儲存失敗，請稍後再試。如果圖片較大，請嘗試刪除一些圖片。');
            } finally {
                // 恢復按鈕狀態
                button.innerHTML = originalText;
                button.disabled = false;
                lucide.createIcons();
            }
        }

        function deleteRecord(id) {
            openConfirmModal('確認刪除', '確定要刪除此獎懲記錄嗎？', async () => {
                if (!settingsDocRef) return;
                try {
                    await settingsDocRef.collection('penalties').doc(id).delete();
                } catch (e) {
                    alert('刪除失敗，請稍後再試');
                }
            });
        }

        function clearRecords() {
            openConfirmModal('確認清除', '確定要清除今日所有獎懲記錄嗎？', async () => {
                if (!settingsDocRef) return;
                try {
                    for (const record of records) {
                        await settingsDocRef.collection('penalties').doc(record.id).delete();
                    }
                } catch (e) {
                    alert('清除失敗，請稍後再試');
                }
            });
        }

        async function renderStats() {
            const totalRewardsEl = document.getElementById('total-rewards');
            const totalPenaltiesEl = document.getElementById('total-penalties');
            const typeStatsEl = document.getElementById('type-stats');

            if (!settingsDocRef) return;

            try {
                const snapshot = await settingsDocRef.collection('penalties').orderBy('createdAt', 'desc').limit(500).get();
                const allRecords = [];
                snapshot.forEach(doc => allRecords.push({ id: doc.id, ...doc.data() }));

                const rewardCount = allRecords.filter(r => r.category === 'reward').length;
                const penaltyCount = allRecords.filter(r => r.category !== 'reward').length;

                if (totalRewardsEl) totalRewardsEl.textContent = rewardCount;
                if (totalPenaltiesEl) totalPenaltiesEl.textContent = penaltyCount;

                const typeCounts = {};
                allRecords.forEach(r => {
                    const type = r.type || '其他';
                    typeCounts[type] = (typeCounts[type] || 0) + 1;
                });

                if (typeStatsEl) {
                    if (Object.keys(typeCounts).length === 0) {
                        typeStatsEl.innerHTML = '<p class="text-gray-400 text-sm">尚無數據</p>';
                    } else {
                        typeStatsEl.innerHTML = Object.entries(typeCounts)
                            .sort((a, b) => b[1] - a[1])
                            .map(([type, count]) => `
                                <div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-b-0">
                                    <span class="text-gray-700 text-sm">${escapeHtml(type)}</span>
                                    <span class="font-bold text-gray-800">${count} 筆</span>
                                </div>
                            `).join('');
                    }
                }
            } catch (e) {
                if (totalRewardsEl) totalRewardsEl.textContent = '0';
                if (totalPenaltiesEl) totalPenaltiesEl.textContent = '0';
                if (typeStatsEl) typeStatsEl.innerHTML = '<p class="text-gray-400 text-sm">無法載入統計</p>';
            }
        }

        function closeModal() {
            const modal = document.getElementById('success-modal');
            if (modal) modal.classList.add('hidden');
        }

        function openConfirmModal(title, message, action) {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-message').textContent = message;
            pendingConfirmAction = action;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function confirmModalCancel() {
            document.getElementById('confirm-modal').classList.add('hidden');
            pendingConfirmAction = null;
        }

        async function confirmModalOk() {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (pendingConfirmAction) {
                await pendingConfirmAction();
            }
            pendingConfirmAction = null;
        }

        function openShareModal() {
            document.getElementById('share-modal').classList.remove('hidden');
        }

        function closeShareModal() {
            document.getElementById('share-modal').classList.add('hidden');
        }

        function hideAppChrome() {
            const header = document.getElementById('page-header');
            const nav = document.getElementById('page-nav');
            if (header) header.classList.add('hidden');
            if (nav) nav.classList.add('hidden');
        }

        function showAppChrome() {
            const header = document.getElementById('page-header');
            const nav = document.getElementById('page-nav');
            if (header) header.classList.remove('hidden');
            if (nav) nav.classList.toggle('hidden', !!isPublicView);
            
            // 設置圖片上傳功能
            setupImageUpload('penalty-image-input', 'penalty-image-preview', false);
            setupImageUpload('edit-image-input', 'edit-image-preview', true);
        }

        function renderAuthScreen(msg) {
            hideAppChrome();
            const main = document.getElementById('app-main');
            if (!main) return;
            main.innerHTML = `
                <div class="mt-10 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <div class="text-lg font-black text-gray-800 mb-2">需要登入</div>
                    <div class="text-sm text-gray-500 mb-5">${msg || '請先登入後才能檢視罰扣頁面。'}</div>
                    <a href="./" class="inline-flex items-center justify-center w-full bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl py-3 transition-colors">前往登入</a>
                </div>
            `;
        }

        function renderErrorScreen(msg) {
            hideAppChrome();
            const main = document.getElementById('app-main');
            if (!main) return;
            main.innerHTML = `
                <div class="mt-10 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <div class="text-lg font-black text-gray-800 mb-2">無法載入</div>
                    <div class="text-sm text-gray-500 mb-5">${msg || '發生錯誤'}</div>
                    <a href="./" class="inline-flex items-center justify-center w-full bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl py-3 transition-colors">返回</a>
                </div>
            `;
        }

        function initFirebaseCompat() {
            if (!window.FIREBASE_CONFIG) throw new Error('缺少 firebase-config.js');
            if (!window.firebase) throw new Error('Firebase SDK 載入失敗');
            if (!firebase.apps || firebase.apps.length === 0) {
                firebase.initializeApp(window.FIREBASE_CONFIG);
            }
            return {
                auth: firebase.auth(),
                db: firebase.firestore()
            };
        }

        async function loadDbUserByEmail(db, email) {
            const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users')
                .where('email', '==', String(email || '').trim())
                .limit(1)
                .get();
            if (snap.empty) return null;
            const doc = snap.docs[0];
            return { id: doc.id, ...doc.data() };
        }

        function computeCanManage(roleId, roleName) {
            const key = String(roleId || '').trim().toLowerCase();
            const name = String(roleName || '').trim();
            if (['admin', 'manager', 'hr', 'property', 'cadre'].includes(key)) return true;
            if (!name) return false;
            if (name.includes('系統管理員')) return true;
            if (name.includes('管理')) return true;
            if (name.includes('人事')) return true;
            if (name.includes('物業')) return true;
            if (name.includes('幹部')) return true;
            return false;
        }

        function resolveAllowedCommunityIds(u) {
            if (!u) return [];
            if (String(u.role || '') === 'admin') return ['*'];
            const ids = Array.isArray(u.communityIds) ? u.communityIds : [];
            if (u.communityId) ids.push(u.communityId);
            return Array.from(new Set(ids.map(x => String(x).trim().toUpperCase()).filter(Boolean)));
        }

        function getRequestedCommunityId() {
            const params = new URLSearchParams(window.location.search || '');
            return String(params.get('communityId') || '').trim().toUpperCase();
        }

        function getIsPublicMode() {
            const params = new URLSearchParams(window.location.search || '');
            return String(params.get('public') || '') === '1';
        }

        function setPageTitle() {
            const el = document.getElementById('page-title');
            if (el) el.textContent = '西北保全股份有限公司 獎懲';
            document.title = '西北保全股份有限公司 獎懲';
        }

        function loadRoles() {
            if (rolesUnsub) { try { rolesUnsub(); } catch {} rolesUnsub = null; }
            
            const rolesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('roles');
            
            rolesUnsub = rolesRef.onSnapshot(snapshot => {
                const loadedRoles = [];
                snapshot.forEach(doc => {
                    loadedRoles.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                roles = loadedRoles;
                if (selectedCommunityId) {
                    updateUserSelectOptions();
                }
            }, error => {
                console.error('Error loading roles:', error);
                roles = [];
            });
        }

        function loadCommunityUsers(commId) {
            if (usersUnsub) { try { usersUnsub(); } catch {} usersUnsub = null; }
            
            const usersRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('users');
            
            usersUnsub = usersRef.onSnapshot(snapshot => {
                const users = [];
                snapshot.forEach(doc => {
                    const userData = doc.data();
                    const userCommunityIds = Array.isArray(userData.communityIds) 
                        ? userData.communityIds 
                        : (userData.communityId ? [userData.communityId] : []);
                    
                    const hasAccessToCommunity = userCommunityIds.includes(commId) || 
                        userCommunityIds.some(id => String(id).trim().toUpperCase() === String(commId).trim().toUpperCase());
                    
                    if (hasAccessToCommunity && userData.status === '在職') {
                        users.push({
                            id: doc.id,
                            name: userData.name || userData.email || '',
                            role: userData.role || '',
                            ...userData
                        });
                    }
                });
                
                communityUsers = users;
                updateUserSelectOptions();
            }, error => {
                console.error('Error loading users:', error);
                communityUsers = [];
                updateUserSelectOptions();
            });
        }

        function updateUserSelectOptions() {
            const penaltyNameSelect = document.getElementById('penalty-name');
            const editNameSelect = document.getElementById('edit-name');
            
            if (!penaltyNameSelect && !editNameSelect) return;
            
            const targetRoleNames = ['總幹事', '秘書', '清潔', '機電', '保全'];
            
            const filteredUsers = communityUsers.filter(user => {
                const userRoleId = user.role || '';
                const roleObj = roles.find(r => r.id === userRoleId);
                const roleName = roleObj ? roleObj.name : '';
                return targetRoleNames.includes(roleName);
            });
            
            const optionsHtml = '<option value="">請選擇人員</option>' + 
                filteredUsers.map(user => {
                    const displayName = user.name || user.email || '';
                    return `<option value="${escapeHtml(displayName)}">${escapeHtml(displayName)}</option>`;
                }).join('');
            
            if (penaltyNameSelect) {
                penaltyNameSelect.innerHTML = optionsHtml;
            }
            
            if (editNameSelect) {
                const currentValue = editNameSelect.value;
                editNameSelect.innerHTML = optionsHtml;
                editNameSelect.value = currentValue;
            }
        }

        function selectCommunity(commId, commName) {
            selectedCommunityId = commId;
            selectedCommunityName = commName;
            selectedRecordsDate = new Date(); // 重置為當日日期
            setPageTitle();
            
            if (settingsUnsub) { try { settingsUnsub(); } catch {} settingsUnsub = null; }
            settingsDocRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('community_penalties').doc(commId);
            
            loadRoles();
            loadCommunityUsers(commId);
            updateRecordsDateLabel();
            updateDateNavButtons();
            subscribeRecordsForDate(selectedRecordsDate);
        }

        function renderCommunitySelector(communities, allowedIds) {
            const main = document.getElementById('app-main');
            if (!main) return;

            const canAccessAny = allowedIds.includes('*') || allowedIds.length > 0;
            if (!canAccessAny) {
                main.innerHTML = `
                    <div class="mt-10 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                        <div class="text-lg font-black text-gray-800 mb-2">無訪問權限</div>
                        <div class="text-sm text-gray-500 mb-5">您的帳號尚未被分配任何社區。</div>
                        <a href="./" class="inline-flex items-center justify-center w-full bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl py-3 transition-colors">返回</a>
                    </div>
                `;
                return;
            }

            const allowedCommunities = communities.filter(c => allowedIds.includes('*') || allowedIds.includes(String(c.id).trim().toUpperCase()));

            main.innerHTML = `
                <div class="space-y-3">
                    <h2 class="font-bold text-gray-800 text-lg">選擇社區</h2>
                    ${allowedCommunities.map(c => `
                        <button onclick='selectCommunity("${String(c.id)}", "${escapeHtml(String(c.name || c.id))}")' class="w-full bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:border-red-300 hover:bg-red-50 transition flex items-center justify-between group">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center text-red-600">
                                    <i data-lucide="building-2" size="20"></i>
                                </div>
                                <div class="text-left">
                                    <div class="font-bold text-gray-800">${escapeHtml(String(c.name || c.id))}</div>
                                    <div class="text-xs text-gray-500">ID: ${escapeHtml(String(c.id))}</div>
                                </div>
                            </div>
                            <i data-lucide="chevron-right" size="20" class="text-gray-400 group-hover:text-red-500 transition"></i>
                        </button>
                    `).join('')}
                </div>
            `;

            lucide.createIcons();
        }

        async function init() {
            try {
                isPublicView = getIsPublicMode();
                
                const { auth, db: firestore } = initFirebaseCompat();
                db = firestore;
                
                auth.onAuthStateChanged(async user => {
                    fbUser = user;
                    
                    if (!user && !isPublicView) {
                        renderAuthScreen();
                        return;
                    }

                    if (user) {
                        dbUser = await loadDbUserByEmail(db, user.email);
                        const roleName = '';
                        canManageSettings = computeCanManage(dbUser?.role, roleName);
                    }

                    showAppChrome();

                    const communitiesSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('communities').get();
                    const communities = [];
                    communitiesSnap.forEach(doc => communities.push({ id: doc.id, ...doc.data() }));

                    if (communities.length === 0) {
                        renderErrorScreen('尚未設定任何社區，請先至總覽頁建立社區。');
                        return;
                    }

                    const allowedIds = dbUser ? resolveAllowedCommunityIds(dbUser) : ['*'];
                    const requestedCommunityId = getRequestedCommunityId();

                    if (requestedCommunityId) {
                        const target = communities.find(c => String(c.id).trim().toUpperCase() === requestedCommunityId);
                        if (target) {
                            selectCommunity(String(target.id), String(target.name || target.id));
                            return;
                        }
                    }

                    // 直接選擇第一個有權限訪問的社區
                    const allowedCommunities = communities.filter(c => allowedIds.includes('*') || allowedIds.includes(String(c.id).trim().toUpperCase()));
                    if (allowedCommunities.length > 0) {
                        selectCommunity(String(allowedCommunities[0].id), String(allowedCommunities[0].name || allowedCommunities[0].id));
                        return;
                    }

                    // 如果沒有權限訪問任何社區，顯示錯誤
                    renderErrorScreen('您沒有權限訪問任何社區。');
                });
            } catch (e) {
                console.error(e);
                renderErrorScreen('初始化失敗，請重新整理頁面。');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
